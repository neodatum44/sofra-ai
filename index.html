// ===================== FİLTRE & PLAN =====================
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function filterByProfile(pool,pr){let f=[...pool];
if(pr.diet==="vejetaryen") f=f.filter(r=>r.tags.includes("vejetaryen")||(!r.tags.some(t=>["et","kıymalı","etli","balık","sucuk","pastırma","işlenmiş_et"].includes(t))));
if(pr.diet==="az_etli"){const veg=f.filter(r=>!r.tags.some(t=>["et","kıymalı","etli","balık","sucuk","pastırma","işlenmiş_et"].includes(t)));const meat=f.filter(r=>r.tags.some(t=>["et","kıymalı","etli","balık","sucuk","pastırma","işlenmiş_et"].includes(t)));const maxMeat=Math.max(2,Math.floor(meat.length*0.3));f=[...veg,...shuffle(meat).slice(0,maxMeat)];}
if(pr.health.includes("diyabet")){const ban=HEALTH_BAN.diyabet;const banIng=["sucuk","pastırma","salam","kaymak","bal ","reçel","pekmez","beyaz ekmek","beyaz pirinç"];f=f.filter(r=>{if(r.tags.some(t=>ban.includes(t)))return false;const nl=r.name.toLowerCase();if(DIYABET_BAN_NAMES.some(w=>nl.includes(w)))return false;if(r.ingredients.some(ing=>{const il=ing.toLowerCase();return banIng.some(bi=>il.includes(bi));}))return false;return true;});if(f.length<5)f=[...new Set([...f,...pool.filter(r=>r.tags.includes("diyabet_dostu"))])];}
if(pr.health.includes("tansiyon")){const banIng=["sucuk","pastırma","salam","turşu","salamura"];f=f.filter(r=>{if(r.tags.some(t=>HEALTH_BAN.tansiyon.includes(t)))return false;if(TANSIYON_BAN_NAMES.some(w=>r.name.toLowerCase().includes(w)))return false;if(r.ingredients.some(ing=>{const il=ing.toLowerCase();return banIng.some(bi=>il.includes(bi));}))return false;return true;});}
if(pr.health.includes("kolesterol")){const banIng=["sucuk","pastırma","salam","kaymak"];f=f.filter(r=>{if(r.tags.some(t=>HEALTH_BAN.kolesterol.includes(t)))return false;if(KOLESTEROL_BAN_NAMES.some(w=>r.name.toLowerCase().includes(w)))return false;if(r.ingredients.some(ing=>{const il=ing.toLowerCase();return banIng.some(bi=>il.includes(bi));}))return false;return true;});}
const sn=getS();if(sn==="kis")f=f.filter(r=>!r.tags.includes("yazlık"));if(sn==="yaz")f=f.filter(r=>!r.tags.includes("kışlık"));
if(pr.dislikes?.length>0)f=f.filter(r=>!pr.dislikes.some(d=>r.name.toLowerCase().includes(d.toLowerCase())||r.ingredients.some(i=>i.toLowerCase().includes(d.toLowerCase()))));
if(pr.skill==="basit")f=f.filter(r=>r.time<=30);
if(pr.budgetLevel==="dar")f=f.filter(r=>r.cost<=20);
return f.length>=3?f:pool;}

function pickU(pool,count,used){if(!pool||pool.length===0)return Array(count).fill({name:"?",cost:0,cal:0,time:0,ingredients:[],steps:[],tags:[]});const av=pool.filter(r=>!used.has(r.name));if(av.length>=count){const p=shuffle(av).slice(0,count);p.forEach(r=>used.set(r.name,1));return p;}const once=pool.filter(r=>(used.get(r.name)||0)<2);const src=once.length>=count?once:pool;const p=shuffle(src).slice(0,Math.min(count,src.length));while(p.length<count)p.push(pool[Math.floor(Math.random()*pool.length)]);p.forEach(r=>used.set(r.name,(used.get(r.name)||0)+1));return p;}
// YEMEK UYUM KURALLARI
const UYUM={
// Çorba → hangi ana yemeklerle uyumlu (tag bazlı)
corba_ana:{"bakliyat":["pilav","sebze","dolma-sarma"],"köfteli":["pilav","sebze","bakliyat"],"yoğurtlu":["bakliyat","sebze","bulgur"],"şifalı":["sebze","hafif","bakliyat"],"sebze":["bakliyat","pilav","kıymalı"],"kremalı":["sebze","hafif"],"etli":["pilav","sebze","bakliyat"],"terbiyeli":["pilav","sebze","hafif"]},
// Ana yemek yanına ne yakışır
ana_yan:{"bakliyat":["pilav","salata","yoğurtlu"],"sebze":["pilav","yoğurtlu","salata"],"zeytinyağlı":["salata","meze","ekşi"],"dolma-sarma":["yoğurtlu","salata"],"kıymalı":["pilav","salata","yoğurtlu"],"patlıcan":["pilav","salata","yoğurtlu"],"bulgur":["salata","yoğurtlu"],"etli":["pilav","salata","yoğurtlu","meze"],"tavuk":["pilav","salata","yoğurtlu"],"kebap":["pilav","salata","meze","yoğurtlu"],"kuzu":["pilav","salata","yoğurtlu"],"balık":["salata","meze","ekşi"],"güveç":["pilav","salata"],"terbiyeli":["pilav","salata"],"mantar":["pilav","salata"],"pilav":["salata","yoğurtlu","meze"],"börek":["salata","yoğurtlu","ekşi"],"hamurişi":["salata","yoğurtlu","ekşi"]},
// Birlikte olmaması gerekenler
conflict:[["pirinç_ağırlıklı","pirinç_ağırlıklı"],["makarna","hamurişi"],["dolma-sarma","dolma-sarma"],["kebap","kebap"],["güveç","güveç"]]
};

function pickCompatible(pool,count,used,refTags){
  // refTags varsa uyumlu olanları öncelikle seç
  if(refTags&&refTags.length>0){
    const uyumTags=new Set();
    refTags.forEach(t=>{const u=UYUM.corba_ana[t]||UYUM.ana_yan[t];if(u)u.forEach(x=>uyumTags.add(x));});
    if(uyumTags.size>0){
      const uyumlu=pool.filter(r=>!used.has(r.name)&&r.tags.some(t=>uyumTags.has(t)));
      if(uyumlu.length>=count){const p=shuffle(uyumlu).slice(0,count);p.forEach(r=>used.set(r.name,1));return p;}
    }
  }
  return pickU(pool,count,used);
}

function avoidConflict(pool,used,existingTags){
  // Aynı gün içinde çakışan yemekleri engelle
  const avoid=new Set();
  UYUM.conflict.forEach(([a,b])=>{if(existingTags.includes(a))avoid.add(b);});
  const filtered=pool.filter(r=>!used.has(r.name)&&!r.tags.some(t=>avoid.has(t)));
  return filtered.length>=1?filtered:pool.filter(r=>!used.has(r.name));
}

function generatePlan(people,region,pr){const days=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];const reg=region==="kisisel"?"genel":region;const kP=filterByProfile([...KAHVALTI.genel,...(KAHVALTI[reg]||[])],pr);const cP=filterByProfile([...CORBA.genel,...(CORBA[reg]||[])],pr);const aP=filterByProfile([...ANA.genel,...(ANA[reg]||[])],pr);const yP=filterByProfile(YAN,pr);const hasDiyabet=pr.health.includes("diyabet");const hasKolesterol=pr.health.includes("kolesterol");const hasTansiyon=pr.health.includes("tansiyon");const hasHamile=pr.health.includes("hamilelik");let tP=TATLI.filter(t=>{if(hasDiyabet)return false;if(hasKolesterol&&(t.tags.includes("kızartma")||t.tags.includes("tereyağlı")||t.tags.includes("şerbetli")))return false;return true;});const noTatli=tP.length===0;if(!noTatli&&tP.length<3)tP=TATLI.filter(t=>!hasDiyabet);const FB={name:"—",cost:0,cal:0,time:0,ingredients:[],steps:[],tags:[]};const TATLI_YOK={name:"🍎 Meyve Tabağı",cost:5,cal:80,time:5,ingredients:["Mevsim meyvesi (elma, portakal, muz)"],steps:["Meyveleri yıkayıp dilimleyin.","Tabağa düzenli dizin.","Sağlıklı ve doğal tatlı alternatifi."],tags:["meyve","sağlıklı","diyabet_dostu"]};const usedK=new Map(),usedC=new Map(),usedA=new Map(),usedY=new Map(),usedT=new Map();const is2=pr.meals===2;return days.map(day=>{
  const kRes=pickU(kP.length?kP:[...KAHVALTI.genel],2,usedK);const k1=kRes[0]||FB;const k2=kRes[1]||FB;
  const cRes=pickU(cP.length?cP:[...CORBA.genel],1,usedC);const c=cRes[0]||FB;
  const cTags=c.tags||[];
  const a1Res=pickCompatible(aP.length?aP:[...ANA.genel],1,usedA,cTags);const a1=a1Res[0]||FB;
  const a1Pool=avoidConflict(aP.length?aP:[...ANA.genel],usedA,a1.tags||[]);
  const a2Res=pickU(a1Pool.length>=1?a1Pool:(aP.length?aP:[...ANA.genel]),1,usedA);const a2=a2Res[0]||FB;
  const yRes=pickCompatible(yP.length?yP:YAN,1,usedY,[...(a1.tags||[]),...(a2.tags||[])]);const y=yRes[0]||FB;
  const tRes=noTatli?[TATLI_YOK]:pickU(tP,1,usedT);const tatli=tRes[0]||TATLI_YOK;
  if(is2){
    const m=people>2?people*0.6:people;
    const cost=Math.round((k1.cost+k2.cost+c.cost+a1.cost+a2.cost+y.cost+tatli.cost)*m);
    const cal=k1.cal+k2.cal+c.cal+a1.cal+a2.cal+y.cal+tatli.cal;
    return{day,meals:2,k1,k2,corba:c,o1:null,o2:null,a1,a2,yan:y,tatli,totalCost:cost,totalCal:cal};
  }else{
    // Öğle için de uyumlu seçim
    const o1Res=pickCompatible(aP.length?aP:[...ANA.genel],1,usedA,cTags);const o1=o1Res[0]||FB;
    const o1Pool=avoidConflict(aP.length?aP:[...ANA.genel],usedA,o1.tags||[]);
    const o2Res=pickU(o1Pool.length>=1?o1Pool:(aP.length?aP:[...ANA.genel]),1,usedA);const o2=o2Res[0]||FB;
    const m=people>2?people*0.6:people;
    const cost=Math.round((k1.cost+k2.cost+c.cost+o1.cost+o2.cost+a1.cost+a2.cost+y.cost+tatli.cost)*m);
    const cal=k1.cal+k2.cal+c.cal+o1.cal+o2.cal+a1.cal+a2.cal+y.cal+tatli.cal;
    return{day,meals:3,k1,k2,corba:c,o1,o2,a1,a2,yan:y,tatli,totalCost:cost,totalCal:cal};
  }
});}
function makeML(plan,people){const items={};plan.forEach(d=>{[d.k1,d.k2,d.corba,d.o1,d.o2,d.a1,d.a2,d.yan,d.tatli].filter(Boolean).forEach(m=>{(m.ingredients||[]).forEach(ing=>{const cl=ing.replace(/[0-9.,]+\s*(sb|yk|çk|adet|g|ml|paket|avuç|dilim|diş|dal|demet|tane|ince|taze|küp|halka|yarım|rendelenmiş|doğranmış|dilimlenmiş|haşlanmış|közlenmiş|ufalanmış|ıslatılmış|kırılmış|küçük|büyük|orta|boy)?\s*/gi,"").replace(/\(.*?\)/g,"").replace(/—.*$/,"").trim();if(cl.length>1&&cl.length<25)items[cl]=(items[cl]||0)+1;});});});return Object.entries(items).map(([n,c])=>({name:n,qty:Math.ceil(c*(people>2?people*0.45:people)),checked:false})).sort((a,b)=>a.name.localeCompare(b.name,"tr"));}

const wordMatch=(text,word)=>{const w=word.toLowerCase().trim();if(w.length<2)return false;if(text.includes(w))return true;const regex=new RegExp("(^|\\s|,|\\(|\\—)"+w+"(\\s|,|\\)|\\—|$|lı|li|lu|lü|ı|i|u|ü|ler|lar|ları|leri|dan|den|tan|ten|nın|nin|nun|nün|ya|ye|sı|si|su|sü)","i");return regex.test(text);};

<MR label="" m={d.k1}/><div style={{borderBottom:`1px dashed ${CC.bd}`}}/><MR label="" m={d.k2}/>
{d.meals!==2&&<><div style={{fontSize:14,fontWeight:700,color:CC.am,marginBottom:3,marginTop:10}}>🍲 ÖĞLE (çorba + 2 ana)</div>
<MR label="Çorba" m={d.corba}/><div style={{borderBottom:`1px dashed ${CC.bd}`}}/><MR label="Ana 1" m={d.o1}/><div style={{borderBottom:`1px dashed ${CC.bd}`}}/><MR label="Ana 2" m={d.o2}/></>}
<div style={{fontSize:14,fontWeight:700,color:CC.purple,marginBottom:3,marginTop:10}}>{d.meals===2?"🌙 AKŞAM (çorba + 2 ana + yan)":"🌙 AKŞAM (2 ana + yan)"}</div>
{d.meals===2&&<><MR label="Çorba" m={d.corba}/><div style={{borderBottom:`1px dashed ${CC.bd}`}}/></>}
<MR label="Ana 1" m={d.a1}/><div style={{borderBottom:`1px dashed ${CC.bd}`}}/><MR label="Ana 2" m={d.a2}/><div style={{borderBottom:`1px dashed ${CC.bd}`}}/><MR label="Yan" m={d.yan}/>
<div style={{fontSize:14,fontWeight:700,color:"#D81B60",marginBottom:3,marginTop:10}}>{profile.health.includes("diyabet")?"🍎 MEYVE (Diyabet Menüsü)":"🍰 TATLI"}</div>
<MR label="" m={d.tatli}/>
</div>}</div>)}
{tab==="market"&&<div style={{background:CC.card,borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.03)"}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><h3 style={{fontSize:14,fontWeight:700,margin:0}}>Market Listesi</h3><span style={{fontSize:14,color:CC.gr,fontWeight:600,background:CC.grL,padding:"2px 8px",borderRadius:8}}>{checked}/{mList.length}</span></div>
<div style={{height:4,background:CC.bd,borderRadius:2,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${mList.length?(checked/mList.length)*100:0}%`,background:CC.gr,transition:"width 0.3s"}}/></div>
{mList.map((it,i)=><div key={i} onClick={()=>setMList(p=>p.map((x,j)=>j===i?{...x,checked:!x.checked}:x))} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:i<mList.length-1?`1px solid ${CC.bd}`:"none",cursor:"pointer",opacity:it.checked?0.3:1,transition:"0.2s"}}>
<div style={{width:18,height:18,borderRadius:4,border:`2px solid ${it.checked?CC.gr:CC.bd}`,background:it.checked?CC.gr:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}>{it.checked&&<IconCheck/>}</div>
<span style={{fontSize:15,flex:1,textDecoration:it.checked?"line-through":"none"}}>{it.name}</span><span style={{fontSize:14,color:CC.mu}}>×{it.qty}</span></div>)}</div>}
{tab==="buz"&&<div>
<div style={{background:CC.card,borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.03)",marginBottom:10}}>
<h3 style={{fontSize:14,fontWeight:700,margin:"0 0 4px"}}>🧊 Buzdolabında Ne Var?</h3>
<p style={{fontSize:14,color:CC.mu,margin:"0 0 10px"}}>Elindeki malzemeleri gir, yapabileceğin yemekleri göster</p>
<div style={{display:"flex",gap:6}}><input value={buzInput} onChange={e=>setBuzInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addBuz()} placeholder="örn: yumurta, domates, soğan..." style={{flex:1,height:36,borderRadius:8,border:`1px solid ${CC.bd}`,padding:"0 10px",fontSize:14,outline:"none"}}/><button onClick={addBuz} style={{height:36,padding:"0 14px",borderRadius:8,background:CC.pr,color:"#fff",border:"none",fontSize:15,fontWeight:600,cursor:"pointer"}}>+</button></div>
{buzItems.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:10}}>{buzItems.map((item,i)=><span key={i} onClick={()=>setBuzItems(p=>p.filter((_,j)=>j!==i))} style={{fontSize:15,background:CC.grL,color:CC.gr,padding:"4px 12px",borderRadius:12,cursor:"pointer",fontWeight:600}}>✕ {item}</span>)}</div>}
{buzItems.length>0&&<button onClick={()=>setBuzItems([])} style={{marginTop:8,background:"none",border:"none",color:CC.mu,fontSize:14,cursor:"pointer",textDecoration:"underline"}}>Tümünü Temizle</button>}
</div>
{buzItems.length>0&&(()=>{const results=findRecipesByIngredients(buzItems);return results.length>0?<div>{results.map((r,i)=><div key={i} onClick={()=>r.steps?.length>0&&setMeal(r)} style={{background:CC.card,borderRadius:12,padding:12,marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,0.03)",cursor:r.steps?.length?"pointer":"default",border:`1px solid ${CC.bd}`}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{flex:1}}><h4 style={{fontSize:14,fontWeight:700,color:CC.tx,margin:0}}>{r.name}</h4>
<div style={{display:"flex",gap:6,marginTop:3,fontSize:14,color:CC.mu}}><span>⏱{r.time}dk</span><span>🔥{r.cal}kcal</span><span>💰~{r.cost}₺</span></div></div>
<div style={{textAlign:"right"}}><div style={{background:r.completionRate>=70?CC.grL:r.completionRate>=40?CC.amL:CC.prL,color:r.completionRate>=70?CC.gr:r.completionRate>=40?CC.am:CC.pr,padding:"3px 10px",borderRadius:10,fontSize:15,fontWeight:700}}>%{r.completionRate}</div></div></div>
<div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>{r.matchedItems.map((m,j)=><span key={j} style={{fontSize:15,background:CC.grL,color:CC.gr,padding:"2px 6px",borderRadius:6}}>✓ {m}</span>)}</div>
{r.steps?.length>0&&<span style={{fontSize:14,color:CC.pr,fontWeight:600,marginTop:4,display:"block"}}>Tarife bak →</span>}
</div>)}</div>:<div style={{background:CC.card,borderRadius:12,padding:20,textAlign:"center"}}><div style={{fontSize:32}}>🤔</div><p style={{fontSize:14,color:CC.mu,margin:"8px 0 0"}}>Bu malzemelerle eşleşen tarif bulunamadı. Daha fazla malzeme eklemeyi deneyin.</p></div>;})()}
{buzItems.length===0&&<div style={{background:CC.card,borderRadius:12,padding:20,textAlign:"center"}}>
<div style={{fontSize:40}}>🥕🧅🥚</div>
<p style={{fontSize:15,color:CC.mu,margin:"8px 0 0"}}>Buzdolabınızdaki malzemeleri yazın,<br/>yapabileceğiniz yemekleri bulalım!</p>
<div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center",marginTop:12}}>{["yumurta","domates","soğan","patates","biber","peynir","bulgur","mercimek","tavuk","kabak","ıspanak","makarna"].map((s,i)=><button key={i} onClick={()=>{if(!buzItems.includes(s))setBuzItems(p=>[...p,s]);}} style={{fontSize:14,padding:"4px 10px",borderRadius:8,border:`1px solid ${CC.bd}`,background:"transparent",color:CC.tx,cursor:"pointer"}}>{s}</button>)}</div>
</div>}
</div>}
</div></div>);
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
