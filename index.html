R("Kaygana (Yumurtalı Pankek)",15,260,12,["Yumurta 2","Un 3 yk","Süt 3 yk","Tuz bir tutam","Tereyağı 1 yk","Beyaz peynir 40g"],["Yumurta, un, süt ve tuzu çırparak pürüzsüz bir hamur elde edin — pancake kıvamında olmalı.","Tavada tereyağını eritin. 1 kepçe hamur dökün, yuvarlak yayılmasını sağlayın.","Her iki tarafını 1-2'şer dk altın rengi pişirin. Toplam 4-5 adet çıkar.","Sıcak sıcak peynir ve reçelle sunun. Anadolu'nun her köşesinde yapılan klasik kahvaltılıktır."],["yumurta","hamurişi"]),

R("Acuka (Cevizli Sos)",14,180,8,["Ceviz 50g çekilmiş","Kırmızı biber salçası 1 yk","Pul biber 1 çk","Sarımsak 1 diş","Zeytinyağı 1 yk","Kimyon, tuz"],["Cevizi rondodan geçirin veya havanda dövün — çok ince olmasın, hafif parçacıklı kalsın.","Salça, pul biber, ezilmiş sarımsak, kimyon ve tuzu cevize ekleyip iyice yoğurun.","Zeytinyağını gezdirip macun kıvamına getirin.","Ekmek üzerine sürerek kahvaltıda sunun — Karadeniz ve Kafkas mutfağının vazgeçilmezi."],["ceviz","kahvaltılık","düşük_gi"]),
R("Tahinli Pekmezli Dürüm",16,280,5,["Lavaş 2","Tahin 2 yk","Pekmez 2 yk","Ceviz 30g kırılmış"],["Lavaşı düz bir zemine serin. Üzerine ince bir tabaka tahin sürün.","Pekmezi tahinin üstüne gezdirin — eşit dağılsın.","Kırılmış ceviz serpin. Sıkıca rulo sarıp çapraz kesin.","Hızlı ve besleyici bir kahvaltı veya atıştırmalık. Çocuklar çok sever."],["tatlı","hızlı","şekerli"]),
R("Pastırmalı Börek",30,360,25,["Yufka 3 adet","Pastırma 80g ince dilim","Kaşar 60g rendelenmiş","Yumurta 1","Süt 2 yk","Sıvı yağ 2 yk"],["Yufkaları yarım ay şeklinde kesin. Yumurta, süt ve yağı karıştırıp sos yapın.","Her yarım yufkayı sosuyla ıslatın. Üzerine pastırma ve kaşar koyup rulo sarın.","Yağlı tepsiye dizin. Kalan sosu üstüne gezdirin.","180°C fırında 20-25 dk kızarana dek pişirin. Pastırmanın aroması yufkaya siner."],["hamurişi","fırın","pastırma","işlenmiş_et"]),
R("Lor Peynirli Omlet",18,200,8,["Yumurta 3","Lor peyniri 60g","Dereotu 3-4 dal kıyılmış","Tereyağı 1 yk","Tuz"],["Yumurtaları hafifçe çırpın. Lor peynirini ufalayıp yumurtaya ekleyin.","Dereotu ve tuzu karıştırın.","Tavada tereyağını eritip karışımı dökün. Kısık ateşte 3-4 dk pişirin.","Yarısını katlayıp sunun — lor peyniri hafif ve protein açısından zengindir."],["yumurta","peynir","hafif","düşük_gi"]),
R("Zeytin Ezmeli Kahvaltı",16,210,5,["Yeşil zeytin 15 adet çekirdeksiz","Ceviz 30g","Kekik 1 çk","Zeytinyağı 1 yk","Ekmek 3 dilim","Beyaz peynir 50g"],["Zeytinleri ve cevizi rondodan geçirin veya bıçakla ince kıyın.","Kekik ve zeytinyağını ekleyip karıştırarak ezme yapın.","Ekmek dilimlerinin üzerine sürün. Yanına peynir dilimleyin.","Ege kahvaltı sofralarının olmazsa olmazı — sağlıklı yağ kaynağıdır."],["zeytinyağlı","hafif","düşük_gi"]),
R("Pişi (Hamur Kızartması)",18,320,20,["Un 2 sb","Yaş maya 10g veya kuru maya yarım paket","Süt yarım sb ılık","Tuz 1 çk","Şeker 1 çk","Sıvı yağ kızartma için"],["Un, maya, ılık süt, tuz ve şekeri yoğurup yumuşak hamur yapın. Üzerini örtüp 30 dk mayalandırın.","Hamurdan ceviz büyüklüğünde parçalar koparıp elle yuvarlak yassıltın.","Kızgın yağda her iki yüzü altın rengi olana dek kızartın — şişip kabarcık yapmalı.","Kağıt havluya alıp sıcak sıcak peynir veya reçelle sunun."],["hamurişi","kızartma"]),
],
karadeniz:[R("Muhlama (Kuymak)",35,390,18,["Mısır unu 4 yk","Tereyağı 3 yk Trabzon tereyağı","Tel peynir 120g","Su 1 çay bardağı","Tuz"],["Tereyağını kalın tabanlı tavada kısık ateşte eritin — köpürüp geçene dek bekleyin, kahverengileşmesin.","Mısır ununu avuç avuç serpip durmadan karıştırarak 3-4 dk kavurun — un çiğ kokusunu kaybetmeli.","Suyu azar azar ekleyip her seferinde iyice karıştırın.","Peyniri avuç avuç katıp karıştırmaya devam edin — kaşığı kaldırınca uzayan ipliksi yapı doğru kıvamın işareti.","Yüzeyin kızarmasını 1-2 dk bekleyip sıcak sıcak mısır ekmeğiyle sunun — soğursa lastik olur."],["peynir","karadeniz","tereyağlı","kaymak"]),
R("Karalahanalı Yumurta",22,300,15,["Karalahana 200g ince kıyılmış","Yumurta 2","Tereyağı 1 yk","Mısır unu 1 yk","Tuz"],["Karalahanaları iyice yıkayıp ince kıyın. Tereyağını tavada eritin.","Karalahanaları ekleyip orta ateşte 5 dk kavurun — rengi koyulaşıp yumuşamalı.","Mısır ununu serpiştirip 1 dk karıştırarak kavurun — un kıvam verir.","Yumurtaları üzerine kırıp kısık ateşte 3-4 dk beyazlar donana dek pişirin.","Ekmekle sıcak sunun. Karadeniz'in en pratik kahvaltısıdır."],["yumurta","karadeniz","tereyağlı"])],
dogu:[R("Otlu Peynir & Tandır Ekmeği",25,300,5,["Van otlu peyniri 100g","Tandır ekmeği veya lavaş 2","Domates 1","Sivri biber 1 taze","Bal 1 yk"],["Van otlu peynirini kalın dilimler halinde kesin — ince kesince lezzeti ve aroması kaybolur.","Tandır ekmeğini tavada veya fırında 2 dk ısıtın — sıcak ekmek peynirin yağını çözer ve otların kokusu ortaya çıkar.","Tabağa peynir, domates ve biber dilimlerini yerleştirin. Balı ayrı küçük tabakta sunun.","Peynirle dönüşümlü olarak bal yiyin — tatlı-tuzlu kontrast yaratır. Demli çay şarttır."],["peynir","doğu","bal"]),
R("Kavut",14,290,12,["Un 3 yk","Tereyağı 2 yk","Şeker 1 yk","Su 1.5 sb"],["Tereyağını tavada kısık ateşte eritin. Unu ekleyip sürekli karıştırarak 4-5 dk kavurun — fındıksı bir koku yükselmeli.","Suyu kontrollü ve yavaşça ekleyin — sıçrayabilir, dikkatli olun. Hızla karıştırın.","Lapa kıvamına gelene dek 3-4 dk karıştırarak pişirin. Şekeri ekleyip karıştırın.","Sıcak sıcak sunun. Doğu Anadolu'nun kış sabahlarına enerji veren geleneksel kahvaltısıdır."],["tatlı","doğu","tereyağlı","şekerli"])],
guneydogu:[R("Kaymak Bal Kahvaltısı",28,350,3,["Kaymak 60g","Bal 3 yk süzme çiçek balı","Tandır ekmeği 2","Beyaz peynir 50g"],["Kaymağı geniş tabağa kalınca yayın — ince yayarsanız tadı kaybolur.","Üzerine bolca bal gezdirin — balın kaymağın üzerinde göllenmesi göze güzel görünür.","Ekmeği ısıtıp yanında sunun. Kaymak-balı ekmekle sürüp yiyin.","Tuzlu peynirle dönüşümlü yenirse lezzet dengesi kurulur — Güneydoğu'nun klasik kahvaltısıdır."],["tatlı","güneydoğu","kaymak","şekerli","bal"]),
R("Çökelekli Kahvaltı",14,240,3,["Çökelek 80g","Ekmek 3 dilim","Domates 1","Pul biber yarım çk","Zeytinyağı 1 çk"],["Çökeleği tabağa alıp üzerine zeytinyağı gezdirin ve pul biber serpin.","Domatesi ince dilimleyip yanına yerleştirin.","Ekmekle sunun. Çökelek az yağlı ve protein açısından zengindir.","Hafif ama doyurucu bir kahvaltı seçeneğidir."],["peynir","güneydoğu","hafif","düşük_gi"])],
akdeniz:[R("Zeytinyağlı Kekikli Domates",18,220,5,["Domates 2 olgun","Sızma zeytinyağı 2 yk","Kekik 1 çk kuru","Tuz bir tutam","Ekmek 3 dilim","Beyaz peynir 50g","Zeytin 10 tane"],["Domatesleri yıkayıp küçük küpler halinde doğrayın.","Tabağa alıp üzerine sızma zeytinyağını bolca gezdirin. Kekik ve tuzu serpin.","Peynir dilimlerini ve zeytinleri yanına yerleştirin.","Ekmek eşliğinde sunun. Akdeniz kahvaltısının en sade ve sağlıklı halidir."],["hafif","akdeniz","zeytinyağlı","düşük_gi","diyabet_dostu"]),
R("Hellimli Tost",25,310,10,["Hellim peyniri 80g — yarım cm dilimleyin","Ekmek 4 dilim","Domates 1 ince dilimlenmiş","Roka bir avuç"],["Hellimi kuru tavada (yağsız) orta ateşte her iki yüzünü 1-2'şer dk kızartın — kendi yağını salar, dışı kıtır içi yumuşak olur.","Ekmek dilimlerine kızarmış hellimi yerleştirin.","Domates dilimleri ve roka ekleyip kapatın.","Sıcak sunun — hellim soğuyunca sertleşir."],["peynir","akdeniz"])],
ege:[R("Simit Tulum Peyniri",20,310,3,["Simit 1 taze","Tulum peyniri 60g","Domates 1","Zeytinyağı 1 çk","Zeytin 8 tane"],["Simiti ortadan ikiye bölün. Tulum peynirini tabağa alıp üzerine zeytinyağı gezdirin.","Domatesi dilimleyip zeytinlerle birlikte tabağa yerleştirin.","Çay eşliğinde sunun. Ege'nin en sade ve en lezzetli sabah ritüelidir.","Simit taze olmalı — bayat simit lezzeti yarıya düşürür."],["peynir","ege"]),
R("Ege Otlu Börek",26,350,30,["Yufka 3","Ispanak 200g yıkanmış doğranmış","Dereotu yarım demet kıyılmış","Beyaz peynir 80g ufalanmış","Yumurta 1","Zeytinyağı 2 yk"],["Ispanağı yıkayıp ince doğrayın. Dereotu kıyın. Peyniri ufalayıp hepsini karıştırın.","Yufkaları tezgaha açın. Zeytinyağıyla yağlayarak iç harcı serpin ve rulo sarın.","Tepsiye yan yana dizin. Üzerine yumurta-zeytinyağı karışımı sürün.","180°C fırında 22 dk üstü kızarana dek pişirin.","Ege mutfağında zeytinyağı ile yapılan börek daha hafiftir."],["hamurişi","ege","fırın","börek"])],
ic_anadolu:[R("Pastırmalı Yumurta",35,360,10,["Pastırma 6 ince dilim","Yumurta 3","Tereyağı 1 yk","Ekmek 3 dilim"],["Tereyağını tavada kısık ateşte eritin.","Pastırma dilimlerini tek sıra dizin — her yüzünü 30-40 sn kızartın, fazla kızartmayın sertleşir.","Yumurtaları pastırmaların arasına kırıp kısık ateşte 3-4 dk beyazlar pişene dek bekleyin.","Ekmek ve demli çayla sunun. Kayseri'nin meşhur lezzetidir."],["et","iç_anadolu","pastırma","işlenmiş_et","tereyağlı"]),
R("Bazlama & Peynir",18,300,20,["Un 2 sb","Maya yarım paket","Ilık su 1 sb","Tuz yarım çk","Şeker yarım çk","Beyaz peynir 80g"],["Un, maya, ılık su, tuz ve şekeri karıştırıp yumuşak hamur yoğurun. 30 dk mayalandırın — iki katına çıkmalı.","Hamuru 4 parçaya bölüp her birini yuvarlak açın — kalınlık yaklaşık 1 cm olmalı.","Kuru tavayı orta ateşte ısıtın. Bazlamayı koyup her iki yüzünü altın rengi lekeler oluşana dek 3-4'er dk pişirin.","Sıcak bazlamanın arasına peynir koyup ikiye katlayarak sunun — peynir hafifçe eriyecek."],["hamurişi","iç_anadolu"])],
marmara:[R("Kaşarlı Sucuklu Tost",30,380,10,["Tost ekmeği 4 dilim","Sucuk 6 ince dilim","Kaşar 60g","Domates 1 ince dilimlenmiş"],["Sucuk dilimlerini kuru tavada her iki yüzünü 1'er dk kızartın — kendi yağında pişer.","Tost ekmeğine kızarmış sucuk, kaşar ve domates yerleştirin, kapatın.","Tostçuda veya tavada her iki yüzü kızarana dek 2-3'er dk pişirin.","Sıcak sıcak sunun — kaşar eriyip sucukla bütünleşir."],["et","marmara","sucuk","işlenmiş_et"])]};

R("Mercimek Çorbası",12,230,30,["Kırmızı mercimek 1.5 sb","Soğan 1 dörde bölünmüş","Havuç 1 kabaca doğranmış","Patates 1 küçük","Su 5 sb","Tereyağı 1 yk","Tuz 1 çk","Pul biber 1 çk","Limon 1"],["Mercimeği 2-3 kez yıkayın. Tencereye sebzeler ve suyla koyun. Kaynayınca kısık ateşte 20-25 dk pişirin.","Blenderdan pürüzsüz geçirin. Koyu ise sıcak su ekleyin. Tuzlayın.","Tereyağında pul biber 15 sn kavurup gezdirin. Limonla sunun.","Türk mutfağının en temel çorbasıdır — her sofrada olur."],["bakliyat","klasik","düşük_gi","lifli","diyabet_dostu"]),
R("Tarhana Çorbası",10,190,18,["Tarhana 4 yk","Su 4 sb","Salça 1 çk","Tereyağı 1 yk","Nane yarım çk","Tuz 1 çk"],["Tarhanayı 1 bardak soğuk suda çatalla iyice eritin — topak kalmasın.","Kaynar suya karıştırarak ekleyin, salçayı katın. 10 dk sık karıştırarak pişirin — dibe yapışabilir.","Tuz ekleyin. Tereyağında naneyi 15 sn kavurup üstüne gezdirin.","Sıcak ekmekle için. Tarhana şifalı bir çorba olarak bilinir."],["klasik","şifalı"]),
R("Ezogelin Çorbası",14,210,30,["Mercimek 1 sb","Bulgur 3 yk","Pirinç 2 yk","Soğan 1","Salça 1 yk","Biber salçası 1 çk","Tereyağı 1 yk","Su 6 sb","Nane, pul biber, tuz"],["Soğanı kavurun, salçaları 1 dk kavurun. Mercimek, bulgur, pirinç ve su dökün.","25 dk pişirin. Tuzlayın, isterseniz hafifçe blenderdan geçirin.","Tereyağında nane-pul biber kavurup gezdirerek sunun.","Gaziantep kökenli bu çorba Türkiye'nin en sevilen çorbalarından biridir."],["bakliyat","klasik","düşük_gi","lifli","diyabet_dostu"]),
R("Yayla Çorbası",12,180,22,["Yoğurt 250g oda sıcaklığında","Un 1 yk","Yumurta sarısı 1","Pirinç 3 yk","Su 4 sb","Tereyağı 1 yk","Nane, tuz"],["Pirinci suda 15 dk haşlayın. Yoğurt-un-yumurtayı çırpıp 1 sb soğuk su ekleyin.","Tencereden 1 kepçe sıcak su alıp terbiyeye ekleyin — kesilmeyi önler.","Tencereye karıştırarak aktarın. Fokurdatmadan 5 dk pişirin.","Naneli tereyağıyla sunun."],["yoğurtlu","klasik","pirinç_ağırlıklı"]),
R("Domates Çorbası",14,170,20,["Domates 4 rendelenmiş","Un 1 yk","Tereyağı 2 yk","Süt yarım sb","Su 3 sb","Tuz, şeker 1 çk"],["Tereyağında unu 2 dk kavurun — sürekli karıştırın, kahverengileşmesin.","Rendelenmiş domatesi ekleyip 5 dk pişirin. Suyu dökün, 10 dk kaynatın.","Sütü ekleyin, tuz ve şekerle (asitliği kırar) dengeyi ayarlayın.","Kremalı ve yumuşak bir lezzettir, çocuklar özellikle sever."],["sebze","kremalı"]),
R("Düğün Çorbası",18,220,30,["Kıyma 100g","Un 1 yk","Yumurta sarısı 1","Limon 2 yk","Tereyağı 1 yk","Su 5 sb","Tuz, pul biber"],["Kıymadan mercimek tanesi büyüklüğünde minicik köfteler yapın.","Kaynar tuzlu suda 10 dk haşlayın. Yumurta-un-limon terbiyesini çırpıp karıştırarak ekleyin.","2-3 dk fokurdatmadan kaynatın. Pul biberli tereyağıyla sunun.","Düğün ve davet sofralarının klasik çorbasıdır."],["köfteli","terbiyeli"]),
R("Tavuk Suyu Çorbası",16,180,25,["Tavuk butu 1","Havuç 1 küp","Şehriye 3 yk","Su 5 sb","Tuz, limon"],["Tavuğu soğuk suyla kaynatın, köpükleri alın. 20 dk haşlayıp didikleyin.","Suya havuç ve şehriye ekleyip 5 dk pişirin. Didik tavuğu katın.","Tuzlayıp limonla sunun. Hastalık dönemlerinin şifa çorbasıdır."],["şifalı","hafif","düşük_yağ","diyabet_dostu"]),
R("Şehriye Çorbası",8,160,15,["Şehriye yarım sb","Salça 1 yk","Tereyağı 1.5 yk","Su 5 sb","Tuz"],["Tereyağında şehriyeyi altın rengi olana dek 2-3 dk kavurun — sürekli karıştırın yanmasın.","Salçayı ekleyip 30 sn kavurun. 5 bardak su dökün.","8-10 dk pişirip tuzlayın. Sıcak sunun — soğuyunca koyulaşır."],["hızlı","ekonomik"]),
R("Sebze Çorbası",14,150,25,["Patates 1 küp","Havuç 1 küp","Kabak 1 küp","Soğan 1","Domates 1","Tereyağı 1 yk","Su 5 sb","Tuz"],["Soğanı tereyağında 2 dk kavurun. Tüm sebzeleri ekleyip 2-3 dk karıştırın.","Su dökün, 20 dk pişirip blenderdan geçirin.","Tuzlayın, isterseniz zeytinyağı gezdirerek sunun.","Çocuklar için harika bir sebze kaynağıdır."],["sebze","hafif","düşük_yağ","düşük_gi","diyabet_dostu","lifli"]),
R("Köfteli Çorba",18,240,25,["Kıyma 100g","Pirinç 2 yk","Soğan 1 rendelenmiş","Salça 1 yk","Tereyağı 1 yk","Su 5 sb","Tuz, nane"],["Kıymaya soğan, pirinç ve baharat ekleyip minik köfteler yapın.","Salçayı tereyağında kavurup su ekleyin. Köfteleri bırakıp 15 dk pişirin.","Nane serperek sunun. Doyurucu bir ana yemek çorbasıdır."],["köfteli","doyurucu"]),
R("İşkembe Çorbası",22,240,45,["İşkembe 300g haşlanmış ince kıyılmış","Un 2 yk","Tereyağı 2 yk","Yumurta sarısı 1","Limon suyu 2 yk","Sarımsak 3 diş","Sirke 1 yk","Tuz"],["Haşlanmış işkembeyi ince şeritler halinde kesin. 4 sb suda 20 dk kaynatın.","Ayrı tencerede tereyağında unu kavurup 1 sb ılık su ekleyerek béchamel sos yapın. İşkembe suyuna karıştırın.","TERBİYE: Yumurta sarısını limon suyu ile çırpın. 1 kepçe sıcak çorbayı azar azar ekleyip ısıtın. Tencereye dökün.","Sarımsağı sirke ile ezin. Ayrı kapta sunun — herkes kendi ekler. Gece çorbası olarak meşhurdur."],["işkembe","terbiyeli"]),
R("Toyga Çorbası",14,180,30,["Yoğurt 1 sb","Un 2 yk","Yumurta 1","Nohut yarım sb haşlanmış","Pirinç 2 yk","Nane, tereyağı 1 yk","Tuz","Su 4 sb"],["Yoğurt, un ve yumurtayı kasede çırparak pürüzsüz karışım yapın.","3-4 sb suyu ekleyip tencerede karıştırarak kaynatın — sürekli karıştırın yoksa kesilir.","Haşlanmış nohut ve yıkanmış pirinci ekleyin. 15 dk kısık ateşte pişirin.","Tereyağında nane kavurup üstüne gezdirin. Yoğurt çorbalarının en klasiğidir."],["yoğurtlu","bakliyat"]),
R("Hanım Ağa Çorbası",16,200,25,["Kıyma 100g","Soğan 1 rendelenmiş","Domates 1 rendelenmiş","Biber salçası 1 yk","Un 1 yk","Tereyağı 1 yk","Nane, tuz, karabiber","Su 5 sb"],["Kıymayı yağsız tavada kavurup suyunu çekmesini bekleyin. Rendelenmiş soğanı ekleyip 2 dk kavurun.","Domatesi ve salçayı katıp 2 dk karıştırın. Suyu ekleyip kaynatın.","Ayrı tavada tereyağında unu kavurup çorbaya karıştırın — kıvam verir.","Nane, tuz ve karabiber ile tatlandırın. 10 dk kaynatıp sunun — dolgun ve doyurucu."],["etli","kıymalı"]),
R("Lebeniye Çorbası",16,210,35,["Yoğurt 1 sb","Nohut yarım sb haşlanmış","Kıyma 80g","Pirinç 2 yk","Soğan 1","Nane, tereyağı","Un 1 yk, yumurta 1","Tuz"],["Nohutları önceden haşlayın. Kıymayı kavurup tuz ekleyin.","Yoğurt, un ve yumurtayı çırpıp 4 sb su ile tencerede kaynatın — sürekli karıştırın.","Kaynamaya başlayınca nohut, pirinç ve kavurulmuş kıymayı ekleyin. 15 dk pişirin.","Tereyağında nane kavurup üstüne gezdirin. Güneydoğu klasiğidir."],["yoğurtlu","etli"]),
R("Paça Çorbası",25,280,60,["Dana paça 2 adet","Sarımsak 4 diş","Limon suyu 3 yk","Un 2 yk","Yumurta sarısı 1","Sirke 1 yk","Tuz, karabiber"],["Pacaları bol suda 45-60 dk haşlayın — kemikten ayrılana dek. Etleri ayırıp suyunu süzün.","5 sb paça suyunu tencerede kaynatın. Etleri küçük parçalara ayırıp ekleyin.","TERBİYE: Yumurta sarısı, limon suyu ve unu çırpın. 1 kepçe sıcak suyu ekleyip tencereye dökün.","Sirke-sarımsak sosunu ayrı kapta sunun. Gece/sabah çorbası olarak da bilinir."],["terbiyeli","geleneksel"]),
R("Yüksük Çorbası",10,160,20,["Un 1 sb","Yumurta 1","Tuz","Domates salçası 1 yk","Tereyağı 1 yk","Su 5 sb","Nane"],["Un, yumurta ve tuzu karıştırıp sert hamur yoğurun. Küçük parçalar koparıp parmakla bastırarak yüksük şekli verin.","Su ve salçayı kaynatın. Yüksükleri tek tek sıcak suya bırakın.","15 dk yüksükler şişip yüzeye çıkana dek pişirin.","Tereyağında nane kavurup üstüne gezdirin. Anadolu'nun en eski çorbalarından biridir."],["hamurişi","ekonomik"]),

karadeniz:[R("Karalahana Çorbası",14,200,30,["Karalahana 250g ince kıyılmış","Kuru fasulye yarım sb ıslatılmış","Mısır unu 2 yk","Soğan 1","Tereyağı 1 yk","Tuz"],["Islatılmış fasulyeleri tencereye alıp 20 dk haşlayın.","Soğanı tereyağında kavurup tencereye ekleyin. Karalahanaları katıp 10 dk pişirin.","Mısır ununu yarım bardak soğuk suda eritip çorbaya karıştırarak ekleyin — topak olmaması için sürekli karıştırın.","5 dk daha koyulaşana dek pişirin. Karadeniz'in kış çorbasıdır."],["karadeniz","bakliyat","lifli"])],
guneydogu:[R("Beyran Çorbası",22,300,40,["Kuzu kemiği 200g","Pirinç 3 yk","Sarımsak 3 diş ezilmiş","Tereyağı 1 yk","İsot (Urfa biberi) 1 yk","Su 6 sb","Tuz"],["Kuzu kemiğini soğuk suyla tencereye koyup kaynatın, köpükleri alın.","Kısık ateşte 30 dk haşlayın — et kemikten kolayca ayrılmalı. Eti didikleyin.","Suya pirinci ekleyip 10 dk pişirin. Didik eti ve sarımsağı katın.","İsotlu tereyağı hazırlayıp üstüne gezdirin. ÇOK SICAK sunun — Beyran soğuk içilmez."],["güneydoğu","etli"])],
dogu:[R("Ayran Aşı",12,200,25,["Yoğurt 350g","Bulgur yarım sb","Un 1 yk","Soğan 1 küçük ince doğranmış","Tereyağı 1 yk","Kuru nane 1 çk","Tuz","Su 3 sb"],["Bulguru 3 bardak suda haşlayın — 15 dk kadar yumuşamalı.","Yoğurdu ayrı kapta un ile çırpın. 1 kepçe sıcak su ekleyip karıştırın — kesilmeyi önler.","Terbiyeyi tencereye karıştırarak ekleyin. 5 dk kısık ateşte pişirin.","Soğanı tereyağında kavurup nane ekleyin. Çorbaya gezdirerek sunun."],["doğu","yoğurtlu","düşük_gi"])],
akdeniz:[R("Ekşili Bulgur Çorbası",10,190,20,["Bulgur 3 yk","Domates 1 rendelenmiş","Soğan 1 doğranmış","Limon suyu 2 yk","Kuru nane 1 çk","Tereyağı 1 yk","Su 4 sb","Tuz"],["Soğanı tereyağında 2-3 dk kavurun. Rendelenmiş domatesi ekleyip 2 dk pişirin.","Bulguru katıp 4 bardak su dökün. 15 dk pişirin.","Limon suyu ve nane ekleyin. Tuzlayıp sunun — ekşili lezzet yaz aylarında ferahlatır."],["akdeniz","düşük_gi","diyabet_dostu"])],
ege:[R("Terbiyeli Sebze Çorbası",14,160,20,["Kabak 1 küp","Havuç 1 küp","Patates 1 küp","Yumurta sarısı 1","Limon suyu 1 yk","Tereyağı 1 yk","Su 4 sb","Tuz"],["Sebzeleri küp doğrayıp 4 bardak suda 15 dk haşlayın — yumuşamalı.","Yumurta sarısı ve limon suyunu çırpın. 1 kepçe sıcak çorba ekleyip karıştırın.","Terbiyeyi tencereye karıştırarak aktarın. 3-4 dk fokurdatmadan pişirin.","Tereyağıyla sunun. Ege'nin hafif ve besleyici çorbasıdır."],["ege","hafif","düşük_yağ"])],
ic_anadolu:[R("Arabaşı Çorbası",18,220,30,["Tavuk 1 but","Un 2 yk","Tereyağı 2 yk","Su 5 sb","Tuz","Ekmek 3-4 dilim"],["Tavuk butunu 5 bardak suda 20 dk haşlayın. Çıkarıp didikleyin, suyu saklayın.","Ayrı tencerede tereyağında unu sürekli karıştırarak 2-3 dk kavurun — çiğ kokusu gitmeli.","Tavuk suyunu azar azar ekleyip her seferinde karıştırın — topak olmamalı. 10 dk pişirin.","Didik tavuğu katın. Geniş tabağa ekmek dizin, üzerine çorbayı dökerek sunun — İç Anadolu'nun geleneksel usulüdür."],["iç_anadolu","etli"])]};

R("Kuru Fasulye",20,330,55,["Kuru fasulye 2 sb — en az 8 saat ıslatılmış","Soğan 1 ince doğranmış","Salça 2 yk","Biber salçası 1 yk","Sıvı yağ 2 yk","Sıcak su 4-5 sb","Tuz 1 çk","Karabiber"],["Fasulyeleri 3 kez yıkayın. Soğanı 3-4 dk kavurun. Salçaları 1-2 dk kavurun.","Fasulyeleri katıp SICAK su dökün. Kısık ateşte 40-45 dk pişirin.","Her 15 dk kontrol edin, su azalmışsa sıcak su ekleyin.","SON 5 DK tuzlayın — erken tuz sertleştirir. Pilavı, turşu ve soğanla sunun."],["bakliyat","klasik","kışlık","düşük_yağ","lifli","düşük_gi","diyabet_dostu"]),
R("Mercimek Köftesi",14,250,30,["Kırmızı mercimek 1 sb","İnce bulgur 1.5 sb","Soğan 2 çok ince doğranmış","Salça 1 yk","Sıvı yağ 2 yk","Maydanoz 1 demet kıyılmış","Taze soğan 3-4 dal","Limon 2 yk","Tuz, pul biber, kimyon"],["Mercimeği 15 dk haşlayın. Bulguru sıcak mercimeğe ekleyip 10 dk demleyin.","Soğanları kavurup salçayla katın. Baharat ve limon ekleyip yoğurun.","Yeşillikleri son ekleyin, şekil verip marulda limonla sunun.","Türkiye'nin en sevilen soğuk mezesidir."],["bakliyat","soğuk","vejetaryen","düşük_yağ","lifli","düşük_gi","diyabet_dostu"]),
R("Nohut Yemeği",18,310,50,["Nohut 2 sb 12 saat ıslatılmış","Soğan 1 ince doğranmış","Domates salçası 1.5 yk","Tereyağı 1 yk","Sıcak su 4 sb","Tuz 1 çk"],["Islatılmış nohutları bol suyla yıkayın — ıslatma suyunu mutlaka dökün. Nohutlar şişmiş ve tombul olmalı.","Tereyağını tencerede eritip soğanı orta ateşte 3-4 dk pembeleşene dek kavurun.","Salçayı ekleyip 1 dk kokusu çıkana dek kavurun — salça rengi koyulaşacak.","Nohutları tencereye katıp 1 dk karıştırarak yağla kaplayın.","4 bardak kaynar suyu dökün — soğuk su nohutların kabuğunu sertleştirir.","Kaynayınca kısık ateşte 40-45 dk pişirin. Nohutlar çatalla kolayca ezilmeli ama dağılmamalı.","Son 5 dk tuz ekleyin — erken tuz bakliyatları sertleştirir. Pirinç veya bulgur pilavıyla sunun."],["bakliyat","klasik","lifli","düşük_gi","diyabet_dostu"]),
R("Bulgur Pilavı",10,260,22,["Pilavlık bulgur 2 sb","Soğan 1 ince doğranmış","Domates salçası 1 yk","Tereyağı 1.5 yk","Sıcak su 3 sb","Tuz 1 çk"],["Tereyağını tencerede orta ateşte eritin. Soğanı 3-4 dk pembeleşene dek kavurun — şeffaflaşıp tatlı koku vermeli.","Salçayı ekleyip 30 sn karıştırın. Bulguru katıp 1-2 dk yağla kaplanana dek kavurun — bu adım pilavın tane tane olmasının sırrıdır.","3 bardak sıcak su ve tuzu ekleyin. Kaynayınca ateşi en kısığa alıp kapağı sıkıca kapatın.","15 dk suyunu çekene dek pişirin — kapağı açmayın ve karıştırmayın.","Ateşi kapatıp 5 dk demleyin. Çatalla alttan üste kabartarak sunun — kaşıkla karıştırmayın taneler ezilir."],["pilav","temel","ekonomik","tam_tahıl","lifli","düşük_gi","diyabet_dostu"]),
R("Patates Yemeği",16,270,30,["Patates 4 orta boy — 2 cm küp doğrayın","Soğan 1 ince doğranmış","Domates 2 rendelenmiş","Sivri biber 2 halka doğranmış","Domates salçası 1 yk","Sıvı yağ 2 yk","Sıcak su 1.5 sb","Tuz 1 çk","Karabiber"],["Sıvı yağı tencerede kızdırın. Soğanı 3 dk pembeleştirin.","Salçayı ekleyip 30 sn kavurun. Patates küplerini ve biber halkalarını katın.","2-3 dk karıştırarak yağla kaplayın — patateslerin kenarları hafif renk almalı.","Rendelenmiş domatesleri ve sıcak suyu dökün. Tuz ve karabiber ekleyin.","Kaynayınca kısık ateşte 20-25 dk patateler çatalla kolayca dağılana dek pişirin.","Ekmek veya pilavla sunun. Kalan varsa ertesi gün daha lezzetli olur."],["sebze","sulu","ekonomik"]),
R("Makarna (Salçalı)",12,350,18,["Makarna 350g burgu veya kalem","Domates salçası 2 yk","Tereyağı 2 yk","Pul biber 1 çk","Tuz"],["Büyük tencereye bol su koyup kaynatın. 1 yk tuz atın — makarna suyu deniz kadar tuzlu olmalı, lezzet sırrıdır.","Makarnayı kaynar suya dökün. Paketin süresinden 1 dk erken süzün — al dente yani iç kısmı hafif sert kalmalı.","Bu sürede ayrı tavada tereyağını eritin. Salçayı ekleyip 1 dk karıştırarak kavurun — çiğ kokusu gitmeli.","Pul biberi serpin. Süzülen makarnayı soslu tavaya aktarıp 30 sn karıştırarak kaplayın.","Hemen sunun — bekledikçe yapışır ve kurar."],["makarna","hızlı","ekonomik","pirinç_ağırlıklı"]),
R("Ispanak Yemeği",18,210,25,["Ispanak 500g — köklerini kesin bol suda 3 kez yıkayın iri doğrayın","Soğan 1 ince doğranmış","Pirinç 3 yk yıkanmış","Domates salçası 1 çk","Sıvı yağ 1.5 yk","Sıcak su 1 sb","Tuz 1 çk"],["Soğanı sıvı yağda 3-4 dk iyice pembeleştirin — soğan iyi kavrulmazsa yemek yavan olur, bu en önemli püf noktasıdır.","Salçayı ekleyip kokusu çıkana dek 1 dk kavurun — salçayı ıspanaktan önce kavurmak şarttır yoksa çiğ tat verir.","Yıkanmış ıspanakları tencereye katın — çok görünse de pişince küçülecek. 2-3 dk suyunu salana dek karıştırın.","Yıkanmış pirinci ve 1 bardak sıcak suyu ekleyin. Fazla su koymayın, ıspanak kendi suyunu salar.","Kısık ateşte kapağı kapatarak 15-18 dk pirinci yumuşayana dek pişirin. Son dakika tuzlayın.","Sarımsaklı yoğurt ile sunun — yoğurtsuz ıspanak yarım kalmış sayılır."],["sebze","sağlıklı","hafif","lifli"]),
R("Yeşil Mercimek",14,310,40,["Yeşil mercimek 1.5 sb yıkanmış","Soğan 1 ince doğranmış","Havuç 1 küçük küp doğranmış","Domates salçası 1 yk","Sıvı yağ 1.5 yk","Su 4 sb","Tuz 1 çk","Kimyon yarım çk"],["Sıvı yağda soğanı 3 dk kavurun. Havuç küplerini ekleyip 2 dk daha kavurun.","Salçayı ekleyip 30 sn karıştırın — kokusu çıkmalı.","Yıkanmış mercimeği tencereye katın. 4 bardak suyu dökün.","Kaynayınca kısık ateşte 30-35 dk mercimek yumuşayana dek pişirin — ara ara karıştırın dipte yapışabilir.","Son 5 dk tuz ve kimyonu ekleyin. Kıvam koyu olmalı ama kaşıktan akmalı.","Bulgur pilavı ve yanında limon dilimi ile sunun."],["bakliyat","sulu","düşük_yağ","lifli","düşük_gi","diyabet_dostu"]),
R("Pirinç Pilavı",14,290,22,["Baldo pirinç 2 sb","Tel şehriye 1 avuç","Tereyağı 2 yk","Sıcak su 3 sb","Tuz 1 çk"],["Pirinci geniş kaba alıp ılık tuzlu suda 20 dk bekletin. Sonra su berraklaşana dek 3-4 kez yıkayıp süzün — nişastası gidince tane tane olur.","Tencerede tereyağını eritin. Şehriyeyi ekleyip sürekli karıştırarak altın sarısı renk alana dek 2-3 dk kavurun — yanmasın dikkat edin.","Süzülmüş pirinci ekleyin. 1-2 dk kısık ateşte yağla kaplanana dek karıştırın.","3 bardak SICAK suyu ve tuzu ekleyin — soğuk su taneleri çatlatır. Kaynayınca ateşi en kısığa alıp kapağı sıkıca kapatın.","12-14 dk pişirin. Kapağı açmayın, kulak verin — cızırdama sesi geliyorsa su çekilmiş demektir.","Ateşi kapatın. Kapağın altına kağıt havlu veya temiz bez koyup kapatın. 10 dk demleyin — havlu fazla buharı emer, pilav kabarır.","Çatalla alttan üste kabartarak sunun — kaşıkla karıştırmayın taneler ezilir."],["pilav","temel","pirinç_ağırlıklı"]),
R("Kapuska",12,230,30,["Beyaz lahana yarım baş — ince ince doğrayın","Soğan 1 ince doğranmış","Domates salçası 1 yk","Sıvı yağ 2 yk","Tuz 1 çk","Karabiber","Pul biber yarım çk","Sıcak su 1 sb"],["Sıvı yağı geniş tencerede kızdırın. Soğanı 3 dk pembeleşene dek kavurun.","Salçayı ekleyip 30 sn karıştırarak kavurun — çiğ kokusu gitmeli.","İnce doğranmış lahanayı tencereye katın. Orta ateşte 5 dk sürekli karıştırarak kavurun — lahana suyunu salıp küçülecek, hacmi yarıya düşer.","1 bardak sıcak su, tuz, karabiber ve pul biberi ekleyin.","Kısık ateşte kapağı kapatarak 20 dk pişirin — lahana yumuşamalı ama lapa olmamalı, hafif diri kalması güzel.","Ekmekle sıcak sunun. İsteyen limon sıkabilir. Kışın en ekonomik ve doyurucu yemeğidir."],["sebze","ekonomik","kışlık","lifli","düşük_gi","diyabet_dostu"]),
R("Karnıyarık",35,350,40,["Patlıcan 3 orta boy","Kıyma 100g","Soğan 1 ince doğranmış","Domates 1 küp doğranmış","Sivri biber 2","Domates salçası 1 yk","Sıvı yağ kızartma için","Tuz","Karabiber"],["Patlıcanları alacalı soyun — bir şerit soyun bir şerit bırakın. Boyuna yarık açın ama ikiye ayırmayın. Tuzlu suda 10 dk bekletin.","Patlıcanları kızgın yağda kızartın veya sağlıklı yöntem: tepsiye dizin zeytinyağı gezdirip 200°C fırında 15 dk pişirin.","İÇ HARCI: Ayrı tavada soğanı 3 dk kavurun. Kıymayı ekleyip suyunu çekene dek parçalayarak pişirin.","Salçayı 1 dk kavurun. Küp domatesi katıp 2-3 dk pişirin. Tuz ve karabiber ekleyin.","Patlıcanları tepsiye dizin, yarıklarını açıp kaşıkla kıymalı harcı doldurun. Her birinin üstüne yarım biber koyun.","180°C fırında 15 dk pişirin — patlıcanlar yumuşamalı, harç kızarmalı. Sıcak sunun — yanında pilav ve cacık harika gider."],["patlıcan","kıymalı","yazlık","kızartma"]),
R("Kabak Yemeği",15,190,30,["Kabak 3 orta boy — yarım ay dilimleyin","Domates 2 küp doğranmış","Soğan 1 ince doğranmış","Sarımsak 2 diş ezilmiş","Zeytinyağı 3 yk","Tuz 1 çk","Karabiber"],["Zeytinyağını geniş tencerede orta ateşte kızdırın. Soğanı 2-3 dk şeffaflaşana dek kavurun.","Ezilmiş sarımsağı ekleyip 30 sn kokusu çıkana dek kavurun — sarımsak çabuk yanar dikkatli olun.","Kabak dilimlerini katın. 3-4 dk karıştırarak kavurun — kabaklar hafif renk almalı ama yumuşamamalı.","Küp domatesleri ve tuzu ekleyin. Kaynayınca kısık ateşte kapağı kapatarak 18-20 dk pişirin.","Kabaklar çatalla kolayca dağılmalı ama tamamen lapa olmamalı — hafif diri kalması güzel.","Soğuk veya ılık sunun. Sarımsaklı yoğurt yanında mükemmel uyum sağlar."],["sebze","zeytinyağlı","yazlık","hafif","vejetaryen","düşük_gi","diyabet_dostu"]),
R("Yaprak Sarma",22,260,60,["Asma yaprağı 40","Pirinç 1 sb","Soğan 2 ince","Domates 1","Maydanoz","Zeytinyağı 4 yk","Limon 2 yk","Tuz, nane"],["İç harcı: Soğanı zeytinyağında kavurun, pirinç ekleyin. Domates, baharat ve maydanozu katın.","Yaprakları hazırlayıp ince sarın. Tencereye dizin.","Zeytinyağı ve sıcak su ekleyin. Kısık ateşte 35-40 dk pişirin.","Soğutup limonla sunun."],["dolma-sarma","zeytinyağlı","vejetaryen","pirinç_ağırlıklı"]),
R("Biber Dolma",20,250,45,["Dolmalık biber 8-10 adet","Pirinç 1 sb yıkanmış","Soğan 1 ince doğranmış","Domates 1 rendelenmiş","Maydanoz yarım demet kıyılmış","Zeytinyağı 3 yk","Tuz 1 çk","Kuru nane 1 çk","Karabiber","Domates sosu: domates 2 rendelenmiş + su 1 sb"],["Biberlerin üst kapaklarını bıçakla kesin, çekirdeklerini ve zarlarını çıkarın. Kapakları saklayın.","İÇ HARCI: Zeytinyağında soğanı 3 dk kavurun. Pirinci ekleyip 1 dk kavurun. Domates, nane, karabiber ve tuzu katıp yarım bardak su ekleyin. Kısık ateşte pirinç suyu çekene dek 5 dk pişirin — pirinç yarı pişmiş kalmalı. Maydanozu katın.","Harcın ılımasını bekleyin. Biberlerin 3/4'üne kadar doldurun — pirinç şişeceği için boşluk bırakın. Kapakları üstlerine kapatın.","Biberleri tencereye dik olarak sıkıca yerleştirin — devrilmemeleri için birbirine yaslanmalı.","Rendelenmiş domates ve 1 bardak suyu karıştırıp tencerenin kenarından yavaşça dökün.","Kısık ateşte 30-35 dk pirinçler yumuşayana dek pişirin. Soğuk veya ılık sunun."],["dolma-sarma","sebze","vejetaryen","pirinç_ağırlıklı"]),
R("Barbunya Pilaki",18,280,45,["Barbunya 1.5 sb — 8-12 saat ıslatılmış","Soğan 1 ince doğranmış","Havuç 1 yuvarlak dilimlenmiş","Patates 1 küçük küp","Domates 1 rendelenmiş","Zeytinyağı 3 yk","Şeker 1 çk","Tuz 1 çk"],["Islatılmış barbunya tanelerini yıkayın. Tencereye alıp bol su dökün. Kaynayınca kısık ateşte 20-25 dk yarı yumuşayana dek haşlayın — tam pişirmeyin. Süzün.","Ayrı tencerede zeytinyağında soğanı 3 dk kavurun. Havuç ve patates küplerini ekleyip 3 dk daha kavurun.","Rendelenmiş domates, şeker ve tuzu ekleyin. Haşlanmış barbunayı katın. 1 bardak su dökün.","Kısık ateşte 20-25 dk tüm sebzeler yumuşayana dek pişirin — çok karıştırmayın taneler dağılır.","Ocaktan alıp soğumaya bırakın. Soğuk veya ılık, üzerine maydanoz serperek sunun."],["bakliyat","zeytinyağlı","vejetaryen","lifli","düşük_gi","diyabet_dostu"]),
R("Bezelye Yemeği",16,220,30,["Bezelye 2 sb taze veya dondurulmuş","Havuç 1 küp doğranmış","Patates 1 küçük küp","Soğan 1 ince doğranmış","Domates salçası 1 çk","Sıvı yağ 1 yk","Su 1 sb","Tuz 1 çk","Şeker 1 çk"],["Sıvı yağda soğanı 2-3 dk kavurun. Salçayı ekleyip 30 sn karıştırın.","Havuç ve patates küplerini ekleyip 2-3 dk yağla kaplayarak kavurun.","Bezelyeleri katın. 1 bardak suyu, tuz ve şekeri ekleyin — şeker bezelyenin doğal tatlılığını öne çıkarır.","Kısık ateşte kapağı kapatarak 20 dk pişirin — patates yumuşamalı, bezelye rengi canlı kalmalı.","Pilav veya ekmekle sunun. Dondurulmuş bezelye kullanıyorsanız çözdürmeye gerek yok, direkt tencereye atın."],["sebze","sulu"]),
R("Pırasa Yemeği",16,200,30,["Pırasa 3 halka doğranmış","Havuç 1 yuvarlak dilim","Pirinç 3 yk yıkanmış","Zeytinyağı 3 yk","Limon suyu 1 yk","Tuz","Şeker yarım çk"],["Pırasaları yıkayıp 2 cm halka kesin. Zeytinyağında 3-4 dk kavurun.","Havuç ve pirinci ekleyip 1 dk karıştırın. 1 bardak sıcak su, tuz, şeker ve limon suyunu ekleyin.","Kısık ateşte 25 dk pişirin. Soğutup sunun — zeytinyağlılar soğuk yenir."],["sebze","zeytinyağlı","kışlık","vejetaryen"]),
R("Bamya (Zeytinyağlı)",18,180,30,["Bamya 300g","Domates 2 küp","Soğan 1","Zeytinyağı 2 yk","Limon suyu 1 yk","Tuz"],["Bamyaları sirkeyle yıkayıp saplarını temizleyin — çok derinden kesmeyin, iç çıkıp salya yapar.","Soğanı zeytinyağında 2-3 dk kavurun. Bamyaları ekleyip 3 dk hafifçe çevirin.","Küp domatesleri katıp yarım bardak su ekleyin. 18-20 dk kısık ateşte pişirin.","Soğutup limon sıkarak sunun. Yaz aylarının en güzel zeytinyağlısıdır."],["sebze","zeytinyağlı","yazlık","vejetaryen","düşük_gi","diyabet_dostu"]),
R("Türlü (Fırında)",20,240,40,["Patlıcan 1 küp","Kabak 1 küp","Patates 1 küp","Biber 2 halka","Domates 2 dilim","Soğan 1 halka","Zeytinyağı 3 yk","Sarımsak 2 diş ezilmiş","Tuz"],["Tüm sebzeleri yıkayıp kabaca doğrayın — patlıcan ve kabağı küp, biberi halka, domatesi dilim.","Fırın tepsisine karışık olarak dizin. Ezilmiş sarımsak, zeytinyağı ve tuzu gezdirin.","200°C fırında 30 dk pişirin — sebzeler yumuşamalı ve kenarları hafif kızarmalı.","Sıcak veya ılık sunun. Yaz aylarının en sağlıklı fırın yemeğidir."],["sebze","fırın","yazlık","vejetaryen","düşük_gi","diyabet_dostu"]),
R("Lahana Sarma",18,270,50,["Lahana yaprakları 15-20 adet","Pirinç 1 sb yıkanmış","Soğan 1 ince doğranmış","Domates salçası 1 yk","Tuz","Kuru nane 1 çk","Karabiber"],["Lahana yapraklarını kaynar suda 3 dk haşlayıp çıkarın — yumuşamalı ama yırtılmamalı. Kalın damarları bıçakla inceltip.","İç harcı: Pirinci soğan, salça, nane, tuz ve karabiberle karıştırın.","Her yaprağa 1 yk harç koyup sıkıca sarın. Tencereye yan yana dizin.","Üzerini geçecek kadar sıcak su ve 1 yk salça ekleyin. Tabakla bastırın.","Kısık ateşte 35-40 dk pişirin. Yoğurtla sunun. Kış aylarının favorisidir."],["dolma-sarma","kışlık","pirinç_ağırlıklı"]),
R("Etli Ekmek",28,350,35,["Un 2 sb","Maya yarım paket","Ilık su yarım sb","Tuz","Kıyma 100g","Soğan 1 ince doğranmış","Domates 1 ince doğranmış","Biber 2 ince doğranmış","Maydanoz kıyılmış","Pul biber 1 çk"],["Hamuru mayalayıp 20 dk kabartın. Kıymayı soğan, domates, biber, maydanoz ve pul biberle iyice yoğurun.","Hamuru 4 parçaya bölüp oval ve çok ince açın — ne kadar ince o kadar çıtır.","Kıyma harcını ince bir tabaka halinde hamurun üstüne sürün — kalın sürmeyin.","Fırını en yüksek ısıya (250°C) ayarlayıp 8-10 dk pişirin — kenarlar kızarmalı.","Limon sıkıp maydanoz serperek sıcak sunun. Konya'nın meşhur lezzetidir."],["hamurişi","kıymalı","fırın"]),
R("Hünkar Beğendi",50,420,50,["Kuşbaşı dana veya kuzu eti 300g","Soğan 1 doğranmış","Domates 2 doğranmış","Salça 1 yk","Tereyağı 2 yk","Su 2 sb","Tuz, karabiber","BEĞENDİ: Patlıcan 3 közlenmiş","Tereyağı 1 yk","Un 1.5 yk","Süt 1.5 sb","Kaşar 50g rendelenmiş"],["ETİ PİŞİRİN: Tencerede tereyağını eritip eti yüksek ateşte her tarafı mühürleyin — mühürleme suyunu içinde tutar. Suyunu salıp çekene dek pişirin.","Soğanı ekleyip 3 dk kavurun. Salçayı 1 dk kavurun, domatesleri katın. 2 bardak sıcak su ekleyin.","Kısık ateşte kapağı kapatarak 35-40 dk et yumuşayana dek pişirin — çatalla kolayca parçalanmalı.","BEĞENDİ: Közlenmiş patlıcanların kabuklarını soyun, bıçakla ince kıyın. Suyunu sıkın.","Ayrı tencerede tereyağında unu 2 dk kavurun. Sütü azar azar ekleyip sürekli karıştırın — topak olmamalı.","Közlenmiş patlıcanları katıp 3-4 dk karıştırarak pişirin. Kaşar peynirini ekleyip eritin. Tuz ve karabiber ekleyin.","Geniş tabağa önce beğendiyi yayın, üzerine etli harcı dökün. Osmanlı saray mutfağının en görkemli yemeğidir."],["et","özel","elit","tereyağlı"]),
R("Tas Kebabı",45,380,60,["Kuşbaşı kuzu veya dana eti 400g","Soğan 1 büyük doğranmış","Domates 2 doğranmış","Biber 2 doğranmış","Sarımsak 2 diş","Salça 1 yk","Tereyağı 2 yk","Su 1.5 sb","Tuz, karabiber","Defne yaprağı 1"],["Tencereyi iyice ısıtın. Etleri yüksek ateşte her tarafı renk alana dek mühürleyin — suyunu salıp tekrar çekene dek kavurun. Bu adım etin suyunu içinde tutar.","Tereyağını ekleyip 1 dk etlerle çevirin. Soğanı katıp 3 dk pembeleştirin. Sarımsağı 30 sn kavurun.","Biberleri ekleyip 2 dk kavurun. Domatesleri ve salçayı katıp 2-3 dk pişirin.","1.5 bardak sıcak su, tuz, karabiber ve defne yaprağını ekleyin.","Kısık ateşte kapağı kapatarak 45-50 dk et lokum gibi yumuşayana dek pişirin.","Pilav veya patates püresi ile sunun. Türk mutfağının en asil et yemeğidir."],["et","özel","elit"]),
R("Tavuk Sote",25,310,30,["Tavuk göğsü 400g — 2 cm küp doğrayın","Soğan 1 doğranmış","Biber 2 doğranmış","Domates 2 doğranmış","Sarımsak 2 diş","Sıvı yağ 2 yk","Tuz, karabiber, kekik"],["Sıvı yağı tavada kızdırıp tavuk küplerini yüksek ateşte her tarafı beyazlaşana dek 4-5 dk soteleyin — altın rengi olması lezzet katar.","Soğanı ekleyip 2 dk kavurun. Sarımsak ve biberleri katıp 2 dk daha kavurun.","Domatesleri ekleyin. Tuz, karabiber ve kekik serpin. Yarım bardak su koyun.","Kapağı kapatıp kısık ateşte 15 dk pişirin — tavuk tamamen pişmeli, sebzeler yumuşamalı.","Pilav veya makarna ile sunun. Haftanın en pratik etli yemeğidir."],["et","hızlı"]),
R("Kuzu İncik",55,480,90,["Kuzu incik 2 adet","Soğan 1 doğranmış","Havuç 1 doğranmış","Sarımsak 4 diş","Domates 2","Salça 1 yk","Zeytinyağı 2 yk","Tereyağı 1 yk","Su veya et suyu 2 sb","Tuz, karabiber, kekik, defne yaprağı"],["İncikleri yıkayıp kurulayın. Tencerede zeytinyağı ve tereyağını ısıtın.","İncikleri yüksek ateşte her tarafı güzelce kızarana dek mühürleyin — bu adım etin suyunu içinde tutar ve lezzeti yoğunlaştırır. Kenara alın.","Aynı tencerede soğan ve havucu 3-4 dk kavurun. Sarımsağı 30 sn kavurun. Salçayı ekleyip 1 dk kavurun.","Domatesleri katıp 2 dk pişirin. İncikleri tekrar tencereye koyun.","2 bardak sıcak su veya et suyunu dökün. Tuz, karabiber, kekik ve defne yaprağını ekleyin.","Kapağı kapatıp en kısık ateşte 1.5-2 saat pişirin — et kemikten kolayca ayrılacak kadar yumuşamalı.","Patates püresi veya tereyağlı pilav ile sunun. Davet sofralarının en şık yemeğidir."],["et","özel","elit"]),
R("Et Kavurma",40,350,40,["Kuşbaşı kırmızı et 300g","Soğan 2 doğranmış","Domates 2 doğranmış","Biber 3 doğranmış","Tereyağı 2 yk","Tuz, karabiber, pul biber"],["Tencerede tereyağını kızdırın. Etleri yüksek ateşte 5 dk mühürleyin — renk almalı. Suyunu salıp çekene dek pişirin.","Soğanları ekleyip 3-4 dk pembeleştirin. Biberleri katıp 2 dk kavurun.","Domatesleri ekleyin. Tuz, karabiber ve pul biber serpin.","Kısık ateşte 25-30 dk et yumuşayana dek pişirin. Gerekirse çok az sıcak su ekleyin.","Ekmek veya pilavla sıcak sunun. Kurban bayramının klasik yemeğidir."],["et","klasik"]),
R("Fırında Tavuk Baget",22,320,45,["Tavuk baget 6 adet","Patates 3 dilimlenmiş","Soğan 1 halka","Zeytinyağı 3 yk","Tuz, karabiber, kekik, pul biber","Limon suyu 1 yk"],["Bagetleri zeytinyağı, limon suyu, tuz, karabiber, kekik ve pul biberle marine edin. En az 30 dk buzdolabında bekletin — gece bekletirseniz çok daha lezzetli olur.","Fırın tepsisine patates dilimlerini ve soğan halkalarını yayın. Üzerine marine edilmiş bagetleri dizin.","Marine sosunu tepsiye gezdirin.","200°C fırında 35-40 dk pişirin — tavuklar kızarmış ve iç sıcaklığı 75°C olmalı.","Yanında salata ile sunun. Hem pratik hem doyurucu bir fırın yemeğidir."],["et","fırın","pratik"]),
R("İzmir Köfte",32,370,40,["Kıyma 300g","Soğan 1 rendelenmiş","Galeta unu 3 yk","Yumurta 1","Tuz, karabiber, kimyon","Patates 3 dilimlenmiş","Domates 2 dilimlenmiş","Biber 3","Domates sosu: domates 2 rendelenmiş + su 1 sb"],["Kıymaya rendelenmiş soğan, galeta unu, yumurta, tuz, karabiber ve kimyonu ekleyip 5 dk yoğurun.","Ceviz büyüklüğünde parçalar alıp hafif uzunca köfte şekli verin.","Köfteleri tavada her tarafı 2'şer dk kızartıp tepsiye dizin. Patates dilimlerini de kızartıp köftelerin arasına yerleştirin.","Domates ve biber dilimlerini üstüne dizin. Rendelenmiş domates ve suyu karıştırıp tepsiye dökün.","180°C fırında 25-30 dk pişirin — patatesler yumuşamalı, sos koyulaşmalı.","Sıcak sunun. İzmir'in dünyaca ünlü köfte tarifidir."],["kıymalı","fırın","özel"]),
R("Kadınbudu Köfte",28,320,35,["Kıyma 250g","Pirinç 3 yk haşlanmış","Soğan 1 rendelenmiş","Yumurta 2","Un 3 yk","Tuz, karabiber","Maydanoz kıyılmış","Kızartma yağı"],["Kıymayı soğan, haşlanmış pirinç, 1 yumurta, maydanoz, tuz ve karabiberle iyice yoğurun.","Yumurta büyüklüğünde oval köfteler şekillendirin — çok kalın yapmayın yoksa içi çiğ kalır.","Köfteleri kaynar tuzlu suda 5 dk haşlayın. Çıkarıp soğumaya bırakın — bu adım köftelerin dağılmasını önler.","Kalan yumurtayı çırpın. Köfteleri önce una, sonra yumurtaya bulayın.","Kızgın yağda her tarafı altın rengi 3-4 dk kızartın. Kağıt havluya alın.","Yoğurt ve salata ile sunun. Osmanlı saray mutfağının zarif köftesidir."],["kıymalı","kızartma","özel"]),
R("Fırında Köfte Patates",28,350,35,["Kıyma 250g","Soğan 1 rendelenmiş","Maydanoz kıyılmış","Galeta unu 2 yk","Tuz, karabiber, kimyon","Patates 3 dilimlenmiş","Domates 2 dilimlenmiş","Biber 3 halka","Zeytinyağı 2 yk"],["Kıymaya soğan, maydanoz, galeta unu ve baharatları katıp 5 dk yoğurun. Yuvarlak köfteler yapın.","Patatesleri ince dilimleyip tepsinin tabanına yayın. Zeytinyağı, tuz ve karabiber gezdirin.","Köfteleri patateslerin üzerine dizin. Domates ve biber dilimlerini yerleştirin.","Yarım bardak su ekleyin. 200°C fırında 30-35 dk pişirin — patatesler yumuşamalı, köfteler kızarmalı.","Sıcak sunun. En pratik ve en sevilen fırın yemeğidir."],["kıymalı","fırın"]),
R("Tavuk Güveç",25,290,40,["Tavuk but 2 adet parçalanmış","Patates 2 küp","Havuç 1 küp","Biber 2 doğranmış","Mantar 5-6 adet","Domates 2 doğranmış","Sarımsak 3 diş","Zeytinyağı 2 yk","Tuz, kekik, karabiber"],["Tavuk parçalarını tavada zeytinyağıyla 3-4 dk her yüzü renk alana dek soteleyin. Güveç kabına alın.","Patates, havuç, biber, mantar ve domates küplerini tavuğun üzerine yerleştirin.","Sarımsağı ezip ekleyin. Tuz, kekik ve karabiber serpin. 1 bardak su dökün.","Güvecin kapağını kapatıp 180°C fırında 35-40 dk pişirin — tavuk kemikten kolayca ayrılmalı.","Güveç kabında sıcak sunun. Doyurucu ve sağlıklı bir tek kap yemeğidir."],["et","fırın"]),
R("Balık Buğulama",30,250,25,["Balık fileto 400g levrek veya çipura","Domates 1 dilimlenmiş","Biber 2 halka","Soğan 1 halka","Sarımsak 2 diş","Zeytinyağı 2 yk","Limon suyu 1 yk","Tuz, karabiber, kekik","Maydanoz"],["Fırın tepsisine pişirme kağıdı serin. Soğan ve domates dilimlerini alt sıraya dizin.","Balık filetoları üstüne yerleştirin. Tuz, karabiber, kekik serpin.","Biber halkalarını, sarımsak dilimlerini üstüne dizin. Zeytinyağı ve limon suyu gezdirin.","Kağıdın kenarlarını kapatarak paket yapın. 200°C fırında 20-22 dk pişirin — balık beyaz ve pul pul olmalı.","Paketi açıp maydanoz serperek sunun. En sağlıklı balık pişirme yöntemidir — yağsız ve hafif."],["balık","fırın","hafif","sağlıklı","düşük_yağ","düşük_gi","diyabet_dostu"]),
R("Etli Güveç",40,380,55,["Kuşbaşı et 300g","Patates 2 küp","Havuç 1 küp","Kabak 1 küp","Biber 2 doğranmış","Domates 2 doğranmış","Soğan 1 doğranmış","Sarımsak 3 diş","Salça 1 yk","Tereyağı 1 yk","Su 1 sb","Tuz, karabiber, kekik"],["Etleri tencerede tereyağında yüksek ateşte 5 dk mühürleyin. Soğanı ekleyip 3 dk kavurun.","Salçayı 1 dk kavurun. Domatesleri katıp 2 dk pişirin.","Güveç kabına etli harcı aktarın. Patates, havuç, kabak ve biber küplerini üzerine dizin.","Sarımsağı ezin, tuz, karabiber ve kekikle beraber 1 bardak suyu gezdirin.","Kapağı kapatıp 180°C fırında 45-50 dk pişirin — et yumuşacık, sebzeler tam pişmiş olmalı.","Güveçte sıcak sunun. Kış aylarının en doyurucu tek kap yemeğidir."],["et","fırın","özel"]),
R("Tavuklu Pilav",22,350,30,["Pirinç 2 sb yıkanmış","Tavuk göğsü 200g — haşlayıp didikleyin","Tereyağı 2 yk","Şehriye 1 avuç","Su 3 sb","Tuz","Karabiber"],["Tavuk göğsünü tuzlu suda 15 dk haşlayın. Çıkarıp iki çatalla didikleyin — ince lifler halinde olmalı. Suyu saklayın.","Tereyağında şehriyeyi 2 dk kavurun. Yıkanmış pirinci ekleyip 1 dk kavurun.","3 bardak sıcak tavuk suyu ve tuz ekleyin. Kaynayınca kısık ateşte 12-14 dk pişirin.","Ateşi kapatıp didik tavuğu pilavın üstüne yayın. Kapağına havlu koyup 10 dk demleyin.","Çatalla karıştırarak sunun. Karabiber serpin. Hem doyurucu hem pratik bir tek kap yemeğidir."],["et","pilav","pirinç_ağırlıklı"]),
R("Kıymalı Patates Oturtma",25,300,35,["Patates 4 dilimlenmiş","Kıyma 150g","Soğan 1 doğranmış","Domates 2 doğranmış","Biber 2","Salça 1 yk","Sıvı yağ 2 yk","Tuz, karabiber"],["Patates dilimlerini yağda altın rengi kızartın veya fırında pişirin. Tepsiye dizin.","Ayrı tavada soğanı 3 dk kavurun. Kıymayı ekleyip suyunu çekene dek pişirin.","Salçayı 1 dk kavurun. Domates ve biberi katıp 3 dk pişirin. Tuz ve karabiber ekleyin.","Kıymalı harcı patateslerin üstüne dökün. Yarım bardak su ekleyin.","180°C fırında 15-20 dk pişirin. Sıcak sunun — çocukların en sevdiği yemeklerden biridir."],["kıymalı","fırın"]),
],
guneydogu:[
R("Çiğ Köfte",16,230,35,["İnce bulgur 2 sb","İsot 3 yk","Salça 2 yk","Biber salçası 1 yk","Soğan 2 rendelenmiş","Maydanoz 1 demet kıyılmış","Taze soğan 4 dal","Nar ekşisi 2 yk","Zeytinyağı 2 yk","Kimyon, tuz","Marul"],["Bulgura kaynar su ekleyip 10 dk bekletin. Salça ve isot ekleyip EN AZ 15-20 dk kuvvetle yoğurun.","Soğan, kimyon ve tuz katıp 5 dk daha yoğurun. Yeşillikleri son katlayın.","Şekil verip marulda limonla sunun — bekledikçe kurur."],["güneydoğu","bulgur","soğuk","vejetaryen","düşük_yağ","düşük_gi","diyabet_dostu"]),
R("Fellah Köftesi",12,240,30,["İnce bulgur 2 sb","Un 3 yk","Salça 1 yk","Sıcak su 1.5 sb","Taze soğan 4 dal kıyılmış","Maydanoz yarım demet kıyılmış","Nar ekşisi 2 yk","Zeytinyağı 2 yk","Pul biber, tuz"],["Bulgura sıcak su ve salçayı ekleyip 10 dk bekletin. Unu katıp ele yapışmayan hamur kıvamında yoğurun.","Ceviz büyüklüğünde toplar yapın. Kaynar tuzlu suda 5-6 dk haşlayın — yüze çıkınca hazırdır. Kevgirle çıkarın.","Tabağa alıp taze soğan ve maydanozu serpin.","Nar ekşisi ve zeytinyağıyla soğuk sunun. Güneydoğu'nun hafif ve besleyici mezesidir."],["güneydoğu","bulgur","vejetaryen","düşük_gi","diyabet_dostu"]),
R("İçli Köfte",28,310,55,["İnce bulgur 2 sb","İrmik 3 yk","Un 2 yk","Sıcak su 1 sb","Kıyma 100g","Soğan 2 ince doğranmış","Ceviz 40g kırılmış","Tereyağı 1 yk","Pul biber, kimyon, tuz"],["DIŞ HAMUR: Bulgura sıcak su ekleyip 10 dk bekletin. İrmik ve un ekleyip 10 dk pürüzsüz olana dek yoğurun.","İÇ HARCI: Soğanları tereyağında kavurup kıymayı ekleyin. Suyunu çekin. Ceviz ve baharatları katıp soğutun.","Dış hamurdan ceviz büyüklüğünde parça alıp başparmakla fincan şeklinde açın. 1 çk iç koyup sıkıca kapatın.","Kızgın yağda altın rengi kızartın. Veya daha sağlıklı yöntem: kaynar suda 8 dk haşlayın.","Limon sıkarak sunun. Güneydoğu'nun en zarif yemeğidir — misafire değer verildiğinin göstergesidir."],["güneydoğu","özel","kızartma"]),
R("Lahmacun",25,300,35,["Un 2 sb","Maya yarım paket","Ilık su yarım sb","Tuz","Kıyma 100g","Soğan 2 ince doğranmış","Domates 1 ince doğranmış","Biber 2 ince doğranmış","Maydanoz 1 demet","Pul biber, kimyon"],["Hamuru mayalayıp 20 dk kabartın. Kıymayı, soğanları, domatesi, biberi ve baharatları iyice yoğurun — harç pürüzsüz olmalı.","Hamuru 8-10 parçaya bölüp çok ince yuvarlak açın — kağıt inceliğinde olmalı.","Kıyma harcını ince ve eşit bir tabaka halinde hamurun üstüne sürün — kenarlarına kadar kaplayın.","Fırını en yüksek ısıya ayarlayıp (ideal 300°C, yoksa en yüksek) 5-7 dk pişirin — kenarlar kızarmalı.","Maydanoz, limon sıkıp rulo yaparak sıcak yiyin. Ayranla harika gider."],["güneydoğu","hamurişi","kıymalı"]),
R("Ali Nazik",40,320,30,["Patlıcan 2 adet","Kıyma 100g","Soğan 1 ince doğranmış","Salça 1 yk","Yoğurt 200g süzme","Sarımsak 2 diş ezilmiş","Tereyağı 1 yk","Tuz, pul biber"],["Patlıcanları ocak ateşinde veya fırında közleyin — kabuk tamamen kararmış ve iç kısım yumuşamış olmalı. 10 dk dinlendirin.","Kabuklarını soyun, bıçakla ince kıyın — robottan geçirmeyin sulanır. Suyunu sıkın.","Süzme yoğurdu ezilmiş sarımsak ve tuzla karıştırın. Kıyılmış patlıcanı katıp harmanlayın. Tabağa yayın.","Ayrı tavada tereyağında soğanı kavurun. Kıymayı ekleyip suyunu çekene dek pişirin. Salça ve pul biber katın.","Kıymalı harcı yoğurtlu patlıcanın üzerine dökün. Kızgın tereyağı gezdirip sıcak sunun.","Gaziantep'in dünyaca ünlü lezzetidir — közleme patlıcanın is kokusu yemeğin ruhudur."],["güneydoğu","patlıcan","yoğurtlu"])],
dogu:[
R("Bulgur Köftesi",12,240,25,["İnce bulgur 2 sb","Soğan 1 ince rendelenmiş","Salça 1 yk","Maydanoz 1 demet kıyılmış","Pul biber 1 çk","Kimyon yarım çk","Tuz","Limon 1"],["Bulgura kaynar su ekleyip 10 dk bekletin. Salçayı katıp en az 10 dk kuvvetle yoğurun.","Rendelenmiş soğanı ekleyip 5 dk daha yoğurun — hamur yumuşak ve pürüzsüz olmalı.","Pul biber, kimyon ve tuzu katıp son bir kez yoğurun. Kıyılmış maydanozu katlayarak karıştırın.","Şekil verip limon sıkarak sunun. Doğu Anadolu'nun klasik soğuk mezesidir."],["doğu","bulgur","vejetaryen","düşük_gi","diyabet_dostu"]),
R("Kesme Aşı (Erişte)",12,240,35,["Un 2 sb","Yumurta 1","Tuz yarım çk","Yoğurt 200g","Tereyağı 1 yk","Kuru nane 1 çk"],["Un, yumurta ve tuzla sert hamur yoğurun. 10 dk dinlendirin.","İnce açıp unla tozlayın. Rulo yapıp 1 cm genişliğinde şeritler kesin.","Kaynar tuzlu suda 8-10 dk haşlayın — şeritler yumuşamalı ama lapa olmamalı. Süzün.","Tabağa alıp üzerine yoğurt dökün. Tereyağında naneyi kavurup gezdirin."],["doğu","hamurişi","yoğurtlu"]),
R("Kelecoş",14,220,25,["Yeşil mercimek 1 sb yıkanmış","Bulgur yarım sb","Soğan 1 doğranmış","Tereyağı 1 yk","Tuz","Su 3 sb"],["Mercimeği 3 bardak suda 20 dk haşlayın — yumuşamalı ama dağılmamalı.","Bulguru ekleyip 10 dk daha pişirin — bulgur suyu çekmeli.","Soğanı tereyağında altın rengi kavurup tencereye gezdirin.","Ekmekle sunun. Doğu Anadolu'nun en doyurucu bakliyat yemeğidir."],["doğu","bakliyat","lifli","düşük_gi","diyabet_dostu"])],
akdeniz:[
R("Zeytinyağlı Fasulye",18,210,40,["Taze fasulye 500g — uçlarını koparıp ortadan ikiye kırın","Domates 2 küp doğranmış","Soğan 1 ince doğranmış","Zeytinyağı 4 yk","Sarımsak 2 diş","Şeker 1 çk","Tuz"],["Zeytinyağında soğanı 3 dk kavurun. Sarımsağı ekleyip 30 sn kavurun.","Fasulyeleri katıp 3-4 dk karıştırarak kavurun — yağla kaplanmalı.","Domates, şeker, tuz ve yarım bardak su ekleyin.","Kısık ateşte 30-35 dk fasulye yumuşayana dek pişirin. Soğutup sunun."],["akdeniz","zeytinyağlı","vejetaryen","yazlık","düşük_gi","diyabet_dostu","lifli"]),
R("Kısır",14,230,20,["İnce bulgur 2 sb","Salça 1.5 yk","Nar ekşisi 2 yk","Limon suyu 2 yk","Zeytinyağı 3 yk","Taze soğan 4 dal kıyılmış","Maydanoz 1 demet kıyılmış","Domates 1 küp","Salatalık 1 küp","Pul biber 1 çk","Tuz"],["Bulguru geniş kaba alıp kaynar su ekleyin — bulguru tam geçecek kadar. Kapağı kapatıp 10 dk demleyin.","Salça, nar ekşisi, limon suyu ve zeytinyağını ekleyip karıştırın — bulgur sosu emecek.","Küp domates, salatalık, kıyılmış taze soğan ve maydanozu katın.","Pul biber ve tuzu ekleyip son kez karıştırın. Soğuk sunun — marul yapraklarında yenebilir."],["akdeniz","bulgur","soğuk","vejetaryen","düşük_gi","diyabet_dostu"]),
R("Şakşuka",16,200,22,["Patlıcan 2 küp doğranmış","Sivri biber 3 doğranmış","Domates 2 küp","Sarımsak 2 diş ezilmiş","Zeytinyağı 3 yk","Tuz"],["Patlıcanları zeytinyağında orta ateşte 5-6 dk altın rengi kavurun.","Biberleri ekleyip 3 dk daha kavurun. Sarımsağı katıp 30 sn karıştırın.","Küp domatesleri ekleyin. Kısık ateşte 8-10 dk pişirin — sebzeler yumuşamalı.","Yoğurtla sunun. Akdeniz'in en pratik ve lezzetli sebze yemeğidir."],["akdeniz","sebze","vejetaryen","yazlık","düşük_gi","diyabet_dostu"]),
R("Zeytinyağlı Enginar",22,190,40,["Enginar 4 adet","Havuç 1 küp","Bezelye yarım sb","Zeytinyağı 3 yk","Limon suyu 2 yk","Şeker 1 çk","Un 1 çk","Tuz"],["Enginarların dış yapraklarını koparın, iç kısmını kaşıkla temizleyin. Limonlu suda bekletin — kararmasını önler.","Tencerenin tabanına havuç ve bezelyeleri yerleştirin. Enginarları üzerine dizin.","Zeytinyağı, limon suyu, şeker, tuz ve 1 bardak suyu karıştırıp tencereye dökün.","Kısık ateşte 30 dk pişirin — enginar çatalla kolayca delinebilmeli.","Soğutup sunun. Zeytinyağlıların en özel ve değerli yemeğidir."],["akdeniz","zeytinyağlı","vejetaryen","düşük_gi","diyabet_dostu"])],
ege:[
R("Kabak Mücver",16,260,25,["Kabak 2 orta boy rendelenmiş","Yumurta 1","Un 3 yk","Beyaz peynir 50g ufalanmış","Dereotu yarım demet kıyılmış","Taze soğan 2 dal doğranmış","Tuz, karabiber","Sıvı yağ kızartma için"],["Kabakları iri rendeden geçirin. 1 çk tuz serpip 10 dk bekletin — elinizle sıkarak suyunu iyice alın. Bu kritik: sıkmazsanız mücver yumuşak ve yağlı olur.","Sıkılmış kabağa yumurta, un, ufalanmış peynir, dereotu ve taze soğanı ekleyin. Karabiber atıp kaşıkla karıştırın.","Tavaya 1 cm sıvı yağ koyup orta ateşte kızdırın. Bir kaşık karışım alıp yağa bırakın, hafifçe bastırın.","Her tarafını 2-3 dk altın rengi kızartın. Kağıt havluya alıp yağını süzdürün.","Sarımsaklı yoğurt ile sunun. Ege'nin en sevilen yazlık yemeğidir."],["ege","sebze","kızartma","vejetaryen"]),
R("Zeytinyağlı Pırasa",16,180,35,["Pırasa 3 halka doğranmış","Havuç 1 yuvarlak dilim","Pirinç 3 yk","Zeytinyağı 3 yk","Limon suyu 1 yk","Tuz","Şeker yarım çk"],["Pırasaları yıkayıp 2 cm halka kesin. Zeytinyağında 3-4 dk kavurun.","Havuç ve pirinci ekleyip karıştırın. 1 bardak sıcak su, tuz, şeker ve limon suyu ekleyin.","Kısık ateşte 25-30 dk pişirin — pirinçler yumuşamalı.","Soğutup sunun. Kış aylarının en besleyici zeytinyağlısıdır."],["ege","zeytinyağlı","vejetaryen","kışlık"]),
R("Ot Kavurması",12,160,15,["Ispanak veya pazı 300g doğranmış","Soğan 1 doğranmış","Zeytinyağı 2 yk","Sarımsak 2 diş ezilmiş","Limon 1"],["Otları iyice yıkayıp kabaca doğrayın. Zeytinyağında soğanı 2-3 dk kavurun.","Sarımsağı ekleyip 30 sn kavurun. Otları katıp 5-7 dk kavurun — küçülecekler.","Tuzlayıp limon sıkarak sunun. Ege'nin en sade ve en sağlıklı yemeğidir."],["ege","sebze","hafif","vejetaryen","düşük_yağ","düşük_gi","diyabet_dostu"]),
R("Börülce Salatası",14,200,25,["Börülce 1.5 sb — 8 saat ıslatılmış","Soğan 1 ince doğranmış","Domates 1 küp","Maydanoz yarım demet kıyılmış","Zeytinyağı 3 yk","Limon suyu 2 yk","Tuz"],["Islatılmış börülceleri tencereye alıp bol suda 20 dk yumuşayana dek haşlayın. Süzüp soğutun.","İnce doğranmış soğan, küp domates ve kıyılmış maydanozu börülcelere ekleyin.","Zeytinyağı, limon suyu ve tuzla sosunu yapıp karıştırın.","Soğuk sunun. Ege'nin protein deposu salatası, yazın ferahlatır."],["ege","bakliyat","soğuk","vejetaryen","lifli","düşük_gi","diyabet_dostu"]),
R("Çökertme Kebabı",38,420,40,["Dana bonfile 300g şeritler","Patates 2 kibrit şeklinde","Yoğurt 3 yk","Domates sosu 3 yk (domates rendesi+salça+tereyağı)","Lavaş 2","Sıvı yağ kızartma için","Tuz, karabiber"],["Eti ince şeritler halinde kesin. Tuzlayıp tavada yüksek ateşte 3-4 dk sote edin — suyunu çekip kızarmalı.","Patatesleri kibrit çöpü şeklinde kesip kızgın yağda altın rengi kızartın.","Domates sosunu hazırlayın: Rendelenmiş domatesi tereyağında salça ile 3 dk pişirin.","SERVİS: Tabağa lavaş dizin, üzerine kızarmış patates, yoğurt, domates sosu ve eti sıralayın."],["etli","kızartma","kebap"]),
R("Beyti Kebabı",35,400,35,["Kıyma 300g","Sarımsak 3 diş ezilmiş","Yumurta 1","Galeta unu 2 yk","Lavaş 2","Yoğurt 3 yk","Domates sosu 3 yk","Tereyağı 2 yk","Tuz, karabiber, pul biber"],["Kıyma, sarımsak, yumurta, galeta unu, tuz ve baharatları yoğurup 10 dk dinlendirin.","Şiş etrafına sararak veya uzun köfte yapıp ızgara/tavada 4-5 dk pişirin.","Lavaşa tereyağı sürüp pişen köfteleri içine dizin. Sıkıca sarıp dilimleyin.","Tabağa dizin, üzerine yoğurt ve domates sosu dökün. Tereyağı gezdirin."],["etli","kıymalı","kebap"]),
R("Kağıt Kebabı",42,380,50,["Kuşbaşı et 300g","Patates 1 küp","Domates 1 dilim","Biber 2 dilim","Soğan 1 halka","Tereyağı 2 yk","Tuz, karabiber, kekik","Pişirme kağıdı"],["Pişirme kağıdını geniş serin. Ortasına kuşbaşı eti koyun.","Küp patates, domates, biber ve soğan dilimlerini etin üstüne yerleştirin.","Tereyağı parçaları koyup tuz ve baharatları serpin.","Kağıdı sıkıca paket yapıp tepsiye koyun. 180°C fırında 40-45 dk pişirin — kağıdı masada açın."],["etli","fırın","kebap"]),
R("Ekşili Köfte",22,300,35,["Kıyma 200g","Pirinç 2 yk","Soğan 1 rendelenmiş","Un 1 yk","Havuç 1 küp","Patates 1 küp","Limon suyu 2 yk","Yumurta sarısı 1","Tuz, karabiber, nane"],["Kıyma, pirinç, rendelenmiş soğan, tuz ve karabiberi yoğurup ceviz büyüklüğünde köfteler yapın.","3 sb suda patates ve havucu 10 dk kaynatın. Köfteleri tek tek bırakıp 15 dk pişirin.","TERBİYE: Yumurta sarısı, limon suyu ve unu çırpıp 1 kepçe sıcak suyla ısıtın. Tencereye dökün.","5 dk kısık ateşte kaynatıp nane serpin. Ekşili köfte Türk mutfağının en sevilenidir."],["etli","kıymalı","terbiyeli"]),
R("Terbiyeli Köfte",22,290,30,["Kıyma 200g","Pirinç 2 yk","Soğan yarım rendelenmiş","Yumurta 1 (1 sarısı terbiye için)","Limon suyu 2 yk","Un 1 yk","Tuz, karabiber"],["Kıyma, pirinç, soğan, tuz ve karabiberi yoğurup küçük yuvarlak köfteler yapın.","4 sb kaynar suya köfteleri tek tek bırakın. 15-20 dk pişirin.","TERBİYE: Yumurta sarısı, limon ve unu çırpıp 1 kepçe sıcak su ekleyin. Tencereye dökün.","5 dk kısık ateşte kaynatın — kaynattıkça yoğunlaşır. Pilavla sunun."],["etli","kıymalı","terbiyeli"]),
R("Orman Kebabı",45,400,50,["Kuşbaşı et 300g","Patates 2 küp","Havuç 1 küp","Bezelye yarım sb","Domates 1 rendelenmiş","Salça 1 yk","Soğan 1","Sıvı yağ 2 yk","Tuz, karabiber, defne"],["Eti sıvı yağda kavurup suyunu çekmesini bekleyin. Soğanı ekleyip 2 dk kavurun.","Salça ve rendelenmiş domatesi katıp 2 dk karıştırın. 2 sb sıcak su ekleyin.","Küp patates, havuç ve bezelyeyi ekleyin. Defne yaprağını koyup kapağını kapatın.","Kısık ateşte 35-40 dk tüm sebzeler ve et yumuşayana dek pişirin. Doyurucu tek kap yemek."],["etli","sebze","güveç"]),
R("Sultan Kebabı",48,430,45,["Kuşbaşı et 300g","Patlıcan 2 közlenmiş","Yoğurt 3 yk","Domates sosu 3 yk","Tereyağı 2 yk","Tuz, karabiber"],["Eti tereyağında kavurup suyunu çekmesini bekleyin. Tuz ve karabiberle tatlandırın.","Patlıcanları közleyip kabuğunu soyun. Çatalla ezin, tuz ekleyin.","Domates sosunu hazırlayın: Rendelenmiş domatesi tereyağında salça ile 3 dk pişirin.","SERVİS: Tabağa patlıcan ezmesi yayın, üstüne eti dizin, yoğurt ve domates sosu dökün."],["etli","kebap","patlıcan"]),
R("İmam Bayıldı",18,280,40,["Patlıcan 3 adet","Soğan 2 ince halka","Domates 2 küp","Sarımsak 3 diş dilim","Maydanoz 3-4 dal","Zeytinyağı 4 yk","Tuz, şeker bir tutam"],["Patlıcanları alacalı soyup tuzlu suda 15 dk bekletin. Durulayıp sıkın.","Zeytinyağını tavada ısıtıp patlıcanları iki yüzü kızarana dek kızartın. Tepsiye dizin.","Aynı yağda soğan halkalarını 3 dk kavurun. Domates, sarımsak ve maydanozu ekleyin.","Harcı patlıcanların yarık kısmına doldurun. Yarım sb sıcak su ekleyin. 180°C fırında 25 dk pişirin."],["zeytinyağlı","sebze","patlıcan","vejetaryen"]),
R("Patlıcan Musakka",28,350,40,["Patlıcan 3 dilimlenmiş","Kıyma 200g","Domates 2 rendelenmiş","Soğan 1","Biber 2","Salça 1 yk","Sıvı yağ","Tuz, karabiber"],["Patlıcanları yuvarlak dilimleyip tuzlu suda 15 dk bekletin. Kızgın yağda kızartın.","Kıymayı soğanla kavurun. Salça, domates ve biberi ekleyip 5 dk pişirin.","Tepsiye kızarmış patlıcanları dizin, üstüne kıymalı harcı yayın. Tekrar patlıcan dizin.","180°C fırında 20 dk pişirin. Klasik Türk ev yemeğidir — pilavla sunulur."],["etli","kıymalı","patlıcan","fırın"]),
R("Fırında Kuzu Tandır",55,450,120,["Kuzu kol veya but 500g","Patates 2 büyük","Soğan 2","Domates 2","Biber 2","Sarımsak 4 diş","Tereyağı 2 yk","Tuz, karabiber, kekik, defne"],["Kuzu etini fırın tepsisine koyun. Çevresine iri doğranmış patates, soğan, domates ve biberleri yerleştirin.","Sarımsak, tuz, karabiber ve kekik karışımını etin üstüne ovun. Tereyağı parçaları koyun.","1 sb sıcak su ekleyin. Folyo ile sıkıca kapatıp 160°C fırında 2-2.5 saat pişirin.","Son 20 dk folyoyu açıp üstünü kızartın — et çatalla dağılacak kıvamda olmalı."],["etli","kuzu","fırın","özel"]),
R("Kıymalı Börek",25,340,40,["Yufka 4 adet","Kıyma 200g kavrulmuş","Soğan 1 doğranmış","Yumurta 1","Süt 3 yk","Sıvı yağ 3 yk","Tuz, karabiber"],["Kıymayı soğanla kavurup tuz ve karabiberle tatlandırın. Soğutun.","Yumurta, süt ve yağı karıştırıp sos yapın. Yufkaları sosuyla ıslatın.","Her yufkaya kıymalı harç yayıp rulo sarın. Tepsiye kıvrım kıvrım dizin.","Kalan sosu üstüne dökün. 180°C fırında 25-30 dk kızarana dek pişirin."],["hamurişi","kıymalı","fırın"]),
R("Mantarlı Tavuk Sote",24,300,25,["Tavuk göğsü 300g kuşbaşı","Mantar 200g dilimlenmiş","Soğan 1","Biber 1","Domates 1","Sıvı yağ 2 yk","Tuz, karabiber, kekik"],["Tavuğu kuşbaşı doğrayıp sıvı yağda kavurun — suyunu çekip kızarmalı.","Soğanı ekleyip 2 dk kavurun. Mantarları katıp 3 dk pişirin — mantar suyunu salıp çekmeli.","Doğranmış domates ve biberi ekleyip 5 dk pişirin.","Tuz, karabiber ve kekik serpip 2 dk daha pişirin. Pirinç pilavıyla sunun."],["tavuk","sebze","mantar"]),
],

R("Karalahana Sarma",16,270,50,["Karalahana 15-20 yaprak","Pirinç yarım sb yıkanmış","Soğan 1 ince doğranmış","Mısır unu 1 yk","Tereyağı 1 yk","Tuz, karabiber"],["Yaprakları kaynar suda 2-3 dk haşlayın — yumuşamalı ama yırtılmamalı. Kalın damarları bıçakla inceltip.","İç harcı: Pirinç, soğan, mısır unu, tereyağı, tuz ve karabiberi karıştırın.","Her yaprağa 1 çk harç koyup sıkıca sarın. Tencereye düzgünce dizin.","Üzerini geçecek kadar su ve 1 parça tereyağı ekleyin.","Kısık ateşte 35-40 dk pişirin. Karadeniz'in kışlık klasiğidir."],["karadeniz","dolma-sarma"]),
R("Mısır Ekmeği",8,210,30,["Mısır unu 2 sb","Un yarım sb","Yoğurt 2 yk","Yumurta 1","Kabartma tozu 1 çk","Tuz yarım çk","Ilık su"],["Mısır unu, un, yoğurt, yumurta, kabartma tozu ve tuzu geniş kaba alın.","Ilık su ekleyerek kek hamuru kıvamında bir hamur elde edin — ne çok sulu ne çok koyu.","Yağlanmış fırın tepsisine 2 cm kalınlığında eşit yayın.","200°C fırında 20-25 dk üstü altın rengi olana dek pişirin.","Dilimleyip muhlama veya karalahana çorbası yanında sunun."],["karadeniz","hamurişi"]),
R("Hamsili Pilav",25,320,30,["Hamsi 300g — temizlenmiş, kılçıkları alınmış","Pirinç 1.5 sb","Soğan 1 ince doğranmış","Tereyağı 2 yk","Fıstık 2 yk","Tuz","Karabiber","Su 2.5 sb"],["Pirinç pilavını klasik şekilde hazırlayın: soğanı tereyağında kavurun, fıstık ve pirinci ekleyin. Suyla pişirin.","Yağlanmış tepsinin tabanına hamsilerin yarısını yelpaze gibi dizin.","Pilavı hamsilerin üzerine yayın. Kalan hamsileri pilavın üstüne yelpaze dizin.","180°C fırında 15 dk pişirin — hamsiler kızarmalı.","Tepsiyi ters çevirip sunun. Karadeniz'in en şık ve lezzetli pilavıdır."],["karadeniz","balık","pirinç_ağırlıklı"])],

R("Mantı",22,400,60,["Un 2 sb","Yumurta 1","Su yarım sb","Tuz","Kıyma 100g","Soğan 1 küçük rendelenmiş","Yoğurt 250g","Sarımsak 2 diş","Tereyağı 1.5 yk","Pul biber 1 çk","Nane 1 çk"],["Hamuru sert yoğurup 15 dk dinlendirin. Çok ince açıp 3x3 cm kareler kesin.","Kıyma-soğan-baharatı karıştırın. Her kareye minik harç koyup kapatın.","Kaynar tuzlu suda 8-10 dk haşlayın. Sarımsaklı yoğurt ve naneli tereyağıyla sunun.","Kayseri'nin dünyaca ünlü lezzetidir — ne kadar küçük ve ince, o kadar makbul."],["iç_anadolu","hamurişi","özel"]),

R("Arabaşı",18,280,35,["Tavuk 1 but","Un 3 yk","Tereyağı 2 yk","Tuz","Su 5 sb","Ekmek 4 dilim"],["Tavuğu 5 bardak suda 20 dk haşlayın. Çıkarıp iki çatalla didikleyin.","Ayrı tencerede tereyağında unu 2-3 dk kavurun. Tavuk suyunu azar azar ekleyip karıştırın.","10 dk koyu sos kıvamına gelene dek pişirin. Didik tavuğu katın.","Geniş tabağa ekmek dizin, üzerine soslu tavuğu dökerek sunun."],["iç_anadolu","etli"])],

const TATLI=[
{name:"Sütlaç",cost:15,cal:220,time:35,ingredients:["Pirinç yarım sb","Süt 1 litre","Toz şeker 1 sb","Pirinç unu 2 yk","Su 2 sb","Vanilya 1 paket"],steps:["Pirinci yıkayıp 2 bardak suda 15-20 dk yumuşayana dek haşlayın — pirinçler parmakla ezilecek kadar yumuşak olmalı.","Sütü ayrı tencerede kaynatın. Haşlanmış pirinci süzüp kaynar süte ekleyin.","Pirinç ununu yarım bardak soğuk sütte eritip tencereye karıştırarak ekleyin — topak olmaması için sürekli karıştırın.","Şeker ve vanilyayı katıp kısık ateşte 10-12 dk koyu muhallebi kıvamına gelene dek karıştırın.","Kâselere paylaştırın. Üstünü fırında kızartmak isterseniz 200°C'de 10 dk üstü altın rengi olana dek pişirin.","Soğutup buzdolabında 2 saat dinlendirin. Üzerine tarçın serperek sunun."],tags:["sütlü","tatlı","klasik"]},
{name:"Revani",cost:14,cal:280,time:40,ingredients:["İrmik 1 sb","Un 1 sb","Toz şeker 1 sb","Yoğurt 1 sb","Yumurta 3","Kabartma tozu 1 paket","Limon kabuğu rendesi","ŞERBET: Su 2 sb, Şeker 2 sb, Limon suyu 1 yk"],steps:["ŞERBET: Şeker ve suyu kaynatın, limon sıkın. 5 dk kaynatıp soğumaya bırakın — şerbet SOĞUK olmalı.","İrmik, un, şeker ve yoğurdu karıştırın. Yumurtaları tek tek ekleyip çırpın. Kabartma tozu ve limon rendesi katın.","Yağlanmış tepsiye dökün, spatulayla eşit yayın.","180°C fırında 25-30 dk üstü altın rengi olana dek pişirin — kürdan temiz çıkmalı.","SICAK revaniyi fırından çıkarır çıkarmaz SOĞUK şerbeti üzerine gezdirin — sıcak hamur soğuk şerbeti hemen emer.","Baklava dilimi şeklinde kesin. 1 saat şerbeti emmesini bekleyin. Hindistan cevizi veya kaymakla sunun."],tags:["şerbetli","tatlı","fırın","klasik"]},
{name:"Kazandibi",cost:16,cal:190,time:40,ingredients:["Süt 1 litre","Toz şeker yarım sb","Buğday nişastası yarım sb","Pirinç unu 3 yk","Vanilya 1 paket","Pudra şekeri 2 yk","Tereyağı 1 çk"],steps:["Nişasta, pirinç unu ve yarım bardak soğuk sütü pürüzsüz olana dek karıştırın — bu terbiye karışımı.","Kalan sütü ve şekeri tencerede kaynatın. Terbiyeyi karıştırarak azar azar ekleyin.","Kısık ateşte sürekli karıştırarak 8-10 dk muhallebi kıvamına getirin. Vanilyayı katın.","Geniş tavayı veya tepsiyi tereyağıyla yağlayın. Pudra şekerini serpin. Muhallebinin 1/3'ünü ince tabaka halinde dökün.","Ocakta orta ateşte 5-6 dk altı kızarana dek pişirin — karamelize olmalı ama yanmamalı. Bu kazandibi'nin sırrıdır.","Kalan muhallebiyi üstüne dökün. Soğutup buzdolabında 3 saat bekletin. Rulo yaparak dilimleyin."],tags:["sütlü","tatlı","özel","klasik"]},
{name:"Kemalpaşa Tatlısı",cost:14,cal:260,time:35,ingredients:["Un 2 sb","Yumurta 1","Yoğurt 2 yk","Kabartma tozu 1 paket","Sıvı yağ 2 yk","İrmik 2 yk","ŞERBET: Su 2 sb, Şeker 2 sb, Limon suyu 1 yk"],steps:["ŞERBET: Su ve şekeri kaynatın, limon sıkıp 5 dk daha kaynatın. Soğumaya bırakın.","Un, yumurta, yoğurt, kabartma tozu, sıvı yağ ve irmiği karıştırarak yumuşak hamur yoğurun.","Ceviz büyüklüğünde toplar yapın — pişince şişeceği için küçük tutun.","Kızgın yağda altın rengi kızartın. Kağıt havluya alıp yağını süzdürün.","Kızarmış topları soğuk şerbete bırakın. En az 1 saat şerbeti emmesini bekleyin — iki katına şişer.","Kaymak veya dondurma ile sunun. Bursa'nın meşhur tatlısıdır."],tags:["şerbetli","tatlı","kızartma"]},
{name:"Muhallebi",cost:10,cal:160,time:20,ingredients:["Süt 750ml","Toz şeker 4 yk","Buğday nişastası 3 yk","Vanilya 1 paket","Tarçın süsleme için"],steps:["Nişastayı 1 bardak soğuk sütte iyice eritin — topak kalmamalı.","Kalan sütü ve şekeri tencerede kaynatın. Nişastalı karışımı karıştırarak yavaşça ekleyin.","Kısık ateşte sürekli karıştırarak 5-7 dk koyu kıvama gelene dek pişirin. Vanilyayı katın.","Kâselere paylaştırın. Oda sıcaklığında soğutup buzdolabında 2 saat dinlendirin.","Üzerine tarçın serperek sunun. Türk mutfağının en sade ve en hafif tatlısıdır."],tags:["sütlü","tatlı","hafif","diyabet_dostu_değil"]},
{name:"Un Helvası",cost:12,cal:310,time:25,ingredients:["Un 2 sb","Tereyağı 100g","Toz şeker 1 sb","Süt 2 sb","Çam fıstığı 2 yk"],steps:["Tereyağını geniş tencerede eritin. Çam fıstıklarını ekleyip 1 dk hafif renk alana dek kavurun.","Unu ekleyip KISIK ateşte sürekli karıştırarak 15-18 dk kavurun — un fındıksı koku verip kızılımsı renk almalı. Sabırlı olun, erken bırakırsanız çiğ kokar.","Ayrı tencerede süt ve şekeri kaynatın.","Kavrulmuş una kaynar sütlü şerbeti YAVAŞÇA ekleyin — sıçrar, dikkatli olun. Hızla karıştırın.","Kısık ateşte 3-4 dk kaşıkla karıştırarak kıvam almasını sağlayın. Tencereden kolayca ayrılmalı.","Kaşıkla şekil verip tabağa alın. Tarçın serperek sıcak sunun. Cenaze ve mevlit helvası olarak da bilinir."],tags:["tatlı","geleneksel","tereyağlı"]},
{name:"İrmik Helvası",cost:12,cal:290,time:20,ingredients:["İrmik 2 sb","Tereyağı 100g","Süt 2 sb","Toz şeker 1 sb","Çam fıstığı 2 yk"],steps:["Tereyağında çam fıstıklarını 1 dk kavurun. İrmiği ekleyip kısık ateşte 12-15 dk sürekli karıştırarak kavurun — altın rengi olmalı ve fındıksı kokmalı.","Ayrı tencerede süt ve şekeri kaynatın.","Kavrulmuş irmiğe kaynar sütlü şerbeti yavaşça ekleyin — sıçramaya dikkat. Hızla karıştırın.","Kısık ateşte 3-4 dk karıştırarak tencereden ayrılana dek pişirin.","Kapağını kapatıp 5 dk demleyin. Kaşıkla tabağa alıp tarçın serpip sunun."],tags:["tatlı","geleneksel","tereyağlı"]},
{name:"Trileçe",cost:18,cal:320,time:50,ingredients:["Yumurta 4","Toz şeker 1 sb","Un 1 sb","Kabartma tozu 1 çk","Vanilya","SÜT KARIŞIMI: Süt 1 sb, Krema 1 sb, Yoğunlaştırılmış süt 1 kutu","ÜST: Krema 200ml, Karamel için şeker 4 yk"],steps:["Yumurta ve şekeri 5 dk beyazlaşana dek çırpın. Un, kabartma tozu ve vanilyayı eleyerek katlayın.","Yağlanmış tepsiye dökün. 180°C fırında 20-22 dk pişirin — kürdan temiz çıkmalı.","Süt, krema ve yoğunlaştırılmış sütü karıştırın. Fırından çıkan SICAK kekin üzerine yavaşça dökün.","Soğutup buzdolabında en az 4 saat — ideal gece boyu bekletin. Kek sütü tamamen emmeli.","200ml kremayı sert köpük olana dek çırpıp kekin üstüne yayın.","Karamel: 4 yk şekeri kuru tavada eritip amber rengi olunca kremanın üstüne gezdirin. Soğuk sunun."],tags:["sütlü","tatlı","özel","fırın"]},
{name:"Tulumba Tatlısı",cost:14,cal:270,time:35,ingredients:["Su 1 sb","Tereyağı 50g","Tuz bir tutam","Un 1.5 sb","Yumurta 2","İrmik 1 yk","Kızartma yağı","ŞERBET: Su 2 sb, Şeker 2 sb, Limon 1 yk"],steps:["ŞERBET: Su ve şekeri kaynatıp limon sıkın. 5 dk kaynatıp soğutun.","Su, tereyağı ve tuzu kaynatın. Ateşten alıp unu ve irmiği ekleyip tahta kaşıkla hızla karıştırın — hamur tencereden ayrılmalı.","Ilındıktan sonra yumurtaları tek tek ekleyip iyice yoğurun. Hamur parlak ve elastik olmalı.","Yıldız ağızlı sıkma torbası ile 4-5 cm uzunluğunda şeritler halinde kızgın yağa sıkın.","Her tarafı altın rengi olana dek 3-4 dk kızartın. Soğuk şerbete bırakın. 30 dk bekletin."],tags:["şerbetli","tatlı","kızartma"]},
{name:"Aşure",cost:16,cal:200,time:60,ingredients:["Buğday yarım sb haşlanmış","Nohut 3 yk haşlanmış","Kuru fasulye 3 yk haşlanmış","Pirinç 3 yk","Kuru kayısı 5 adet doğranmış","Kuru incir 3 adet doğranmış","Kuru üzüm 3 yk","Ceviz 30g kırılmış","Toz şeker 1 sb","Su 4-5 sb","Gül suyu 1 yk"],steps:["Buğdayı önceden 8 saat ıslatıp 30 dk haşlayın. Nohut ve fasulye de ayrı haşlanmış olmalı.","Büyük tencereye haşlanmış buğday, nohut, fasulye ve pirinci alıp 4-5 bardak su ekleyin. 15 dk pişirin.","Doğranmış kuru kayısı, incir ve kuru üzümü ekleyin. 10 dk daha pişirin.","Şekeri katıp karıştırın. Gül suyunu ekleyin. Kıvam koyu ama akışkan olmalı — koyu ise su ekleyin.","Kâselere paylaştırıp soğutun. Üzerine ceviz, nar tanesi ve tarçın serperek sunun.","Muharrem ayının geleneksel tatlısıdır — komşulara dağıtılır, paylaşmanın simgesidir."],tags:["tatlı","geleneksel","vejetaryen","lifli"]},
{name:"Fırın Sütlaç",cost:16,cal:240,time:45,ingredients:["Pirinç yarım sb","Süt 1 litre","Toz şeker 1 sb","Yumurta sarısı 1","Nişasta 1 yk","Vanilya 1 paket"],steps:["Pirinci yıkayıp 2 bardak suda 15 dk haşlayın.","Sütü kaynatıp haşlanmış pirinci ekleyin. 10 dk kısık ateşte pişirin.","Şekeri katın. Nişastayı az sütte eritip karıştırarak ekleyin. 5 dk daha pişirin.","Güveç kâselerine paylaştırın. Yumurta sarısını üstlerine fırçayla sürün.","Fırının üst ızgarasını açıp 200°C'de 10-12 dk üstü karamelize olana dek kızartın — gözünüzü ayırmayın yanar.","Soğutup buzdolabında 2 saat dinlendirin. O altın rengi üst kabuk fırın sütlacın imzasıdır."],tags:["sütlü","tatlı","fırın","özel"]},
{name:"Supangle",cost:14,cal:250,time:25,ingredients:["Süt 750ml","Toz şeker 4 yk","Kakao 3 yk","Buğday nişastası 3 yk","Tereyağı 1 yk","Vanilya 1 paket","Hindistan cevizi süsleme"],steps:["Nişasta ve kakaoyu 1 bardak soğuk sütte iyice eritin — topak olmamalı.","Kalan sütü ve şekeri tencerede kaynatın. Kakaolu karışımı karıştırarak yavaşça ekleyin.","Kısık ateşte sürekli karıştırarak 5-7 dk koyu puding kıvamına getirin.","Tereyağı ve vanilyayı katıp 1 dk daha karıştırın — tereyağı parlak bir görünüm verir.","Kâselere paylaştırıp soğutun. Buzdolabında 2 saat dinlendirin. Hindistan cevizi serperek sunun."],tags:["sütlü","tatlı","çikolatalı"]},
{name:"Profiterol",cost:25,cal:340,time:45,ingredients:["Su 1 sb","Tereyağı 60g","Un 1 sb","Yumurta 3","Tuz bir tutam","ÇİKOLATA SOS: Bitter çikolata 150g, Krema 100ml, Tereyağı 1 yk"],steps:["Su, tereyağı ve tuzu kaynatın. Ateşten alıp unu ekleyip hızla karıştırın — hamur tencereden ayrılmalı.","Ilıyınca yumurtaları tek tek ekleyip pürüzsüz parlak hamur elde edin.","Yağlı kâğıtlı tepsiye ceviz büyüklüğünde toplar sıkın. 200°C'de 20-22 dk şişip kızarana dek pişirin — fırını açmayın!","Soğuyunca ortadan kesin. İçine kaymak veya vanilyalı muhallebi doldurun.","ÇİKOLATA SOS: Çikolatayı krema ile benmari usulü eritin. Tereyağı katıp karıştırın.","Profiterolleri tabağa dizin, sıcak çikolata sosu gezdirin. Pastahanelerin en gözdesidir."],tags:["tatlı","özel","çikolatalı","fırın"]},
{name:"Cevizli Baklava",cost:30,cal:350,time:90,ingredients:["Hazır baklavalık yufka 1 paket","Ceviz 200g kırılmış","Tereyağı 150g eritilmiş","ŞERBET: Su 2 sb, Şeker 2.5 sb, Limon suyu 1 yk"],steps:["ŞERBET: Şeker ve suyu kaynatın. Limon sıkıp 10 dk kaynatın. Soğutun — şerbet SOĞUK olmalı.","Tereyağını eritip köpüğünü alın — sade yağ kullanmak baklavanın çıtır olmasının sırrıdır.","Yufkaları tepsi boyutunda kesin. 10 yufkayı teker teker tepsiye serip her katı yağlayın.","Kırılmış cevizi eşit serpin. Kalan 10 yufkayı da tek tek yağlayarak üstüne serin.","Baklava dilimi şeklinde kesin. Kalan yağı üstüne gezdirin. 170°C fırında 35-40 dk altın rengi kızarana dek pişirin.","Fırından çıkınca 5 dk bekleyin, sonra SOĞUK şerbeti SICAK baklavanın üzerine dökün. 1-2 saat şerbeti emmesini bekleyin."],tags:["şerbetli","tatlı","fırın","özel","geleneksel"]},
{name:"Kabak Tatlısı",cost:10,cal:200,time:50,ingredients:["Bal kabağı 1 kg dilimlenmiş","Toz şeker 2 sb","Ceviz 50g kırılmış","Tahin veya kaymak"],steps:["Kabağı kabuğunu soyup 4-5 cm kalınlığında dilimleyin. Tepsiye tek sıra dizin.","Üzerine şekeri eşit serpin. Kapağını kapatıp (streç film veya folyo) 4-6 saat veya gece boyu bekletin — şeker kabağın suyunu çeker.","Tencereye alıp SU EKLEMEDEN kısık ateşte 35-40 dk kendi suyunda pişirin — kabak yumuşamalı ama dağılmamalı.","Soğutup buzdolabında dinlendirin. Tabağa alıp üzerine kırılmış ceviz ve tahin veya kaymak gezdirerek sunun.","Kış aylarının en geleneksel tatlısıdır — şeker yerine pekmez kullananlar da var."],tags:["tatlı","geleneksel","kışlık","vejetaryen"]},
